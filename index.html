const Block = ({color="#3b82f6", children, className=""}) => (

    <div>

// Sub-table editor cho arrays (dị ứng, tiêm chủng, tiền sử)
const ArrayEditor = ({value=[], onChange, columns, emptyRow}) => {
  const add = () => onChange([...value, {...emptyRow}]);
  const del = (i) => onChange(value.filter((_,j)=>j!==i));
  const upd = (i,k,v) => { const a=[...value]; a[i]={...a[i],[k]:v}; onChange(a); };
  return (
    <div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr style={{background:"#f8fafc"}}>
              {columns.map(c=><th key={c.key} style={{padding:"6px 8px",textAlign:"left",fontWeight:600,color:"#64748b",borderBottom:"1px solid #e2e8f0",whiteSpace:"nowrap"}}>{c.label}</th>)}
              <th style={{padding:"6px 8px",width:32}}></th>
            </tr>
          </thead>
          <tbody>
            {value.length===0 && <tr><td colSpan={columns.length+1} style={{padding:"12px 8px",textAlign:"center",color:"#94a3b8",fontStyle:"italic"}}>Chưa có dữ liệu</td></tr>}
            {value.map((row,i)=>(
              <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}>
                {columns.map(c=>(
                  <td key={c.key} style={{padding:"4px 4px"}}>
                    <input value={row[c.key]||""} onChange={e=>upd(i,c.key,e.target.value)}
                      style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"4px 6px",fontSize:11,outline:"none"}}/>
                  </td>
                ))}
                <td style={{padding:"4px"}}><button onClick={()=>del(i)} style={{color:"#ef4444",background:"none",border:"none",cursor:"pointer",fontSize:14}}>×</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <button onClick={add} style={{marginTop:8,fontSize:11,color:"#2563eb",background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>+ Thêm dòng</button>
    </div>
  );
};

// ─── Component: form nhập liệu đợt KCB ───────────────────────
const DotKCBForm = ({form, set, onSave, onClose, title}) => {

  const addPT = () => {
    if(!ptForm.ten) return;
    set("ptttDaThucHien")([...(form.ptttDaThucHien||[]), {...ptForm}]);
    setPtForm({ten:"",ngay:today(),moTa:""});
  };
  const delPT = i => set("ptttDaThucHien")((form.ptttDaThucHien||[]).filter((_,j)=>j!==i));

  const sectionCls = {background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 14px",marginBottom:12};

    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
      <span style={{background:color,color:"white",fontWeight:700,fontSize:10,padding:"2px 7px",borderRadius:12}}>{n}</span>
      <span style={{fontWeight:700,fontSize:12,color:"#374151"}}>{lbl}</span>
    </div>
  );
  return (
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      {/* 3.1 Thông tin đợt KCB */}
      <div style={sectionCls}>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <Sel label="Loại hình KCB" value={form.loaiKCB} onChange={set("loaiKCB")} options={LOAI_KCB} placeholder=""/>
          <Sel label="Loại sự kiện" value={form.type} onChange={set("type")} options={EVENT_TYPES} placeholder=""/>
          <Inp label="Tiêu đề *" value={form.title} onChange={set("title")} required/>
          <Inp label="Cơ sở KCB" value={form.facility} onChange={set("facility")}/>
          <Inp label="Mã CSKCB" value={form.maCSKCB||""} onChange={set("maCSKCB")}/>
          <Inp label="Lý do đến khám" value={form.lyDo||""} onChange={set("lyDo")}/>
          <Inp label="Ngày giờ vào viện / đến khám" type="date" value={form.dateIn||form.date} onChange={v=>{ set("dateIn")(v); set("date")(v); }}/>

          <div style={{gridColumn:"1/3"}}><Inp label="Nơi chuyển đến (nếu có)" value={form.noiChuyenDen||""} onChange={set("noiChuyenDen")}/></div>

      </div>

      <div style={sectionCls}>
        {secTitle("3.2","Chẩn đoán xác định khi ra viện","#7c3aed")}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{gridColumn:"1/3"}}><TA label="Chẩn đoán xác định *" value={form.chanDoan||""} onChange={set("chanDoan")} rows={2}/></div>
          <Inp label="Mã ICD-10 (phân cách bằng ;)" value={form.maICD10||""} onChange={set("maICD10")} placeholder="VD: Q21.3;Q22.0"/>
          <Inp label="Tên bệnh theo ICD-10" value={form.tenICD10||""} onChange={set("tenICD10")}/>
          <Inp label="Bác sĩ điều trị" value={form.doctor||""} onChange={set("doctor")}/>
          <Inp label="SĐT bác sĩ (nếu có)" value={form.doctorPhone||""} onChange={set("doctorPhone")}/>
        </div>
      </div>

      {/* 3.3 Kết quả CLS — note: chi tiết lưu trong Labs/Imaging */}
      <div style={{...sectionCls,background:"#fffbeb",borderColor:"#fde68a"}}>
        {secTitle("3.3","Kết quả cận lâm sàng có giá trị","#b45309")}
        <p style={{fontSize:11,color:"#92400e",margin:"0 0 8px"}}>💡 Chi tiết XN/Siêu âm nhập ở mục <strong>Siêu âm & XN</strong> / <strong>CĐHA</strong>. Tóm tắt ở mục 3.6 bên dưới.</p>
        <TA label="Chỉ số theo dõi chính (tóm tắt)" value={form.tomTatKQCLS||""} onChange={set("tomTatKQCLS")} rows={2}/>

        {secTitle("3.4","Thuốc đã điều trị / Đơn thuốc đã kê","#166534")}
        <p style={{fontSize:11,color:"#166534",margin:"0 0 8px"}}>💡 Chi tiết đơn thuốc nhập ở mục <strong>Thuốc</strong>. Ghi tóm tắt tại đây.</p>
        <TA label="Thuốc chính đã kê / dùng" value={form.ghiChu||""} onChange={set("ghiChu")} rows={2}/>

      {/* 3.5 Phẫu thuật / thủ thuật */}
      <div style={sectionCls}>
        {secTitle("3.5","Phẫu thuật / Thủ thuật đã thực hiện","#dc2626")}
        <div style={{marginBottom:8}}>
          {(form.ptttDaThucHien||[]).length===0

                  <strong style={{color:"#dc2626"}}>{pt.ten}</strong>
                  <span style={{color:"#94a3b8",marginLeft:6}}>{pt.ngay}</span>
                  {pt.moTa&&<div style={{color:"#64748b",marginTop:2}}>{pt.moTa}</div>}
                </div>
                <button onClick={()=>delPT(i)} style={{color:"#ef4444",background:"none",border:"none",cursor:"pointer",fontSize:16,lineHeight:1}}>×</button>
              </div>
            ))
          }
        </div>
        <div style={{background:"white",border:"1px dashed #fca5a5",borderRadius:8,padding:10}}>
          <div style={{fontSize:11,fontWeight:600,color:"#dc2626",marginBottom:6}}>+ Thêm PT/thủ thuật</div>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:6,marginBottom:6}}>
            <Inp label="Tên PT/thủ thuật" value={ptForm.ten} onChange={v=>setPtForm(p=>({...p,ten:v}))}/>
            <Inp label="Ngày thực hiện" type="date" value={ptForm.ngay} onChange={v=>setPtForm(p=>({...p,ngay:v}))}/>
          </div>
          <TA label="Mô tả (nếu có)" value={ptForm.moTa} onChange={v=>setPtForm(p=>({...p,moTa:v}))} rows={1}/>
          <button onClick={addPT} style={{marginTop:6,fontSize:11,background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,padding:"4px 12px",cursor:"pointer",fontWeight:600}}>Thêm</button>
        </div>
      </div>

      {/* 3.6 Tóm tắt */}
      <div style={{...sectionCls,background:"#eff6ff",borderColor:"#bfdbfe"}}>
        {secTitle("3.6","Tóm tắt quá trình điều trị & tình trạng người bệnh","#1d4ed8")}
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <TA label="41. Tóm tắt tiền sử, bệnh sử và diễn biến lâm sàng" value={form.tomTatBenhSu||""} onChange={set("tomTatBenhSu")} rows={3}/>
          <TA label="42. Tóm tắt kết quả cận lâm sàng có giá trị" value={form.tomTatKQCLS||""} onChange={set("tomTatKQCLS")} rows={2}/>
          <TA label="43. Tóm tắt phương pháp điều trị đã thực hiện" value={form.tomTatPPDieuTri||""} onChange={set("tomTatPPDieuTri")} rows={2}/>
          <TA label="44. Hướng điều trị tiếp theo / lời dặn / lịch tái khám" value={form.huongDieuTriTiepTheo||""} onChange={set("huongDieuTriTiepTheo")} rows={2}/>
          <Inp label="Ngày tái khám" type="date" value={form.ngayTaiKham||""} onChange={set("ngayTaiKham")}/>

      <Btn onClick={onSave} className="w-full justify-center" style={{marginTop:4}}>💾 Lưu đợt KCB</Btn>

// ─── TimelinePage (view list + modal chi tiết) ───────────────
const TimelinePage = ({events,setEvents}) => {
  const [open,setOpen] = useState(false);
  const [form,setForm] = useState(EMPTY_EV);
  const [editId,setEditId] = useState(null);
  const [sel,setSel] = useState(null);
  const [fType,setFType] = useState("");
  const [confirm,setConfirm] = useState(null);
  const [tab,setTab] = useState("list"); // "list" | "detail"
  const set = k => v => setForm(f=>({...f,[k]:v}));
  const list = events.filter(e=>!fType||e.type===fType).sort((a,b)=>b.date.localeCompare(a.date));

  const openNew = () => { setForm(EMPTY_EV); setEditId(null); setOpen(true); };
  const openEdit = (e,ev) => {
    ev.stopPropagation();
    setForm({...EMPTY_EV,...e});
    setEditId(e.id); setOpen(true);
  };
  const save = () => {
    if(!form.title) return;
    const rec = {...form, date: form.dateIn||form.date};
    if(editId) setEvents(ev=>ev.map(e=>e.id===editId?{...e,...rec}:e));
    else setEvents(ev=>[...ev,{...rec,id:genId(),attachments:[]}]);
    setOpen(false); setEditId(null); setForm(EMPTY_EV);
  };
  const del = id => { setEvents(ev=>ev.filter(e=>e.id!==id)); if(sel?.id===id)setSel(null); setConfirm(null); };

  // Detail view của 1 đợt KCB
  const DetailView = ({e}) => {
    const ei = getET(e.type);
    const sec = (num,lbl,col="#374151") => (
      <div style={{borderTop:"1px solid #f1f5f9",paddingTop:10,marginTop:10}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
          <span style={{background:col,color:"white",fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:10}}>{num}</span>
          <span style={{fontWeight:700,fontSize:12,color:col}}>{lbl}</span>
        </div>
      </div>
    );
    const Row = ({label,val}) => val?(
      <div style={{display:"flex",gap:6,marginBottom:4,fontSize:12}}>
        <span style={{color:"#94a3b8",minWidth:140,flexShrink:0}}>{label}</span>
        <span style={{color:"#1e293b",fontWeight:500}}>{val}</span>

    ):null;
    return (
      <div>
        {/* Header */}
        <div style={{background:"linear-gradient(to right,#1e3a5f,#1d4ed8)",borderRadius:10,padding:"12px 16px",color:"white",marginBottom:12}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
            <span style={{background:"rgba(255,255,255,0.2)",fontSize:10,padding:"2px 8px",borderRadius:10}}>{ei.label}</span>
            <span style={{background:"rgba(255,255,255,0.2)",fontSize:10,padding:"2px 8px",borderRadius:10}}>{e.loaiKCB||""}</span>

            {e.dateIn&&`Vào: ${fmt(e.dateIn)}`}{e.dateOut&&e.dateOut!==e.dateIn&&` — Ra: ${fmt(e.dateOut)}`}
          </div>
        </div>

        {/* 3.1 */}
        {sec("3.1","Thông tin đợt KCB","#2563eb")}
        <Row label="Cơ sở KCB" val={e.facility}/>
        <Row label="Mã CSKCB" val={e.maCSKCB}/>
        <Row label="Lý do đến khám" val={e.lyDo}/>
        <Row label="Kết quả điều trị" val={e.ketQuaDieuTri}/>
        <Row label="Tình trạng ra viện" val={e.tinhTrangRaVien}/>
        <Row label="Nơi chuyển đến" val={e.noiChuyenDen}/>

        {/* 3.2 */}

        {(e.tomTatKQCLS)&&<>{sec("3.3","Kết quả CLS có giá trị","#b45309")}

        {e.ngayTaiKham&&<Row label="Ngày tái khám" val={fmt(e.ngayTaiKham)}/>}
      </div>
    );
  };

    <div className="p-6" style={{maxWidth:960}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>

          <h1 style={{fontSize:22,fontWeight:700,margin:0}}>📋 Đợt Khám Chữa Bệnh</h1>
          <p style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Mục III — QĐ 1332 & 2733/QĐ-BYT · {events.length} đợt</p>

const VITAL_COLS = [
  {key:"height",label:"Chiều cao",unit:"cm",icon:"📏",color:"#3b82f6",normal:""},
  {key:"weight",label:"Cân nặng",unit:"kg",icon:"⚖️",color:"#8b5cf6",normal:""},
  {key:"bmi",label:"BMI",unit:"",icon:"📐",color:"#0891b2",normal:"18.5–24.9"},
  {key:"bloodPressureSys",label:"HA tâm thu",unit:"mmHg",icon:"🩺",color:"#dc2626",normal:"<120"},
  {key:"bloodPressureDia",label:"HA tâm trương",unit:"mmHg",icon:"🩺",color:"#dc2626",normal:"<80"},
  {key:"heartRate",label:"Nhịp tim",unit:"lần/ph",icon:"❤️",color:"#e11d48",normal:"60–100"},
  {key:"spo2",label:"SpO₂",unit:"%",icon:"🫁",color:"#0284c7",normal:">95"},
  {key:"temperature",label:"Nhiệt độ",unit:"°C",icon:"🌡️",color:"#f59e0b",normal:"36–37.5"},
];

const EMPTY_VITAL = {date:today(),height:"",weight:"",bmi:"",bloodPressureSys:"",bloodPressureDia:"",heartRate:"",spo2:"",temperature:"",notes:"",source:"",doctor:""};

const VitalsPage = ({vitals,setVitals}) => {
  const [open,setOpen] = useState(false);
  const [form,setForm] = useState(EMPTY_VITAL);
  const [editId,setEditId] = useState(null);
  const [viewMode,setViewMode] = useState("table"); // "table"|"chart"
  const [confirm,setConfirm] = useState(null);
  const set = k => v => setForm(f=>({...f,[k]:v}));

  const calcBMI = (h,w) => {
    const hm = parseFloat(h)/100, wk = parseFloat(w);
    if(hm>0&&wk>0) return (wk/(hm*hm)).toFixed(1);
    return "";
  };

  const save = () => {
    const rec = {...form, bmi: calcBMI(form.height, form.weight)||form.bmi};
    if(editId) setVitals(v=>v.map(x=>x.id===editId?{...x,...rec}:x));
    else setVitals(v=>[...v,{...rec,id:genId()}]);
    setOpen(false); setEditId(null); setForm(EMPTY_VITAL);
  };
  const del = id => { setVitals(v=>v.filter(x=>x.id!==id)); setConfirm(null); };

  const sorted = [...vitals].sort((a,b)=>b.date.localeCompare(a.date));
  const latest = sorted[0];

  // Chart data: chiều cao & cân nặng theo thời gian
  const chartData = [...vitals].sort((a,b)=>a.date.localeCompare(b.date)).map(v=>({
    date: fmt(v.date), h: parseFloat(v.height)||null, w: parseFloat(v.weight)||null,
    bp: v.bloodPressureSys?`${v.bloodPressureSys}/${v.bloodPressureDia}`:null,
    spo2: parseFloat(v.spo2)||null,
  }));

  return (
    <div className="p-6" style={{maxWidth:960}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:700,margin:0}}>📊 Chỉ số sức khỏe</h1>
          <p style={{fontSize:11,color:"#94a3b8",marginTop:2}}>Module VI — VitalSigns · QĐ 1332/QĐ-BYT · {vitals.length} lần đo</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <div style={{display:"flex",background:"white",border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
            {["table","chart"].map(m=>(
              <button key={m} onClick={()=>setViewMode(m)} style={{padding:"6px 14px",fontSize:12,fontWeight:600,background:viewMode===m?"#dc2626":"white",color:viewMode===m?"white":"#64748b",border:"none",cursor:"pointer"}}>
                {m==="table"?"📋 Bảng":"📈 Biểu đồ"}
              </button>
            ))}
          </div>
          <Btn onClick={()=>{setForm(EMPTY_VITAL);setEditId(null);setOpen(true);}}>+ Thêm đo</Btn>
        </div>
      </div>

      {/* Latest vitals cards */}
      {latest&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {VITAL_COLS.filter(c=>latest[c.key]).map(c=>(
            <div key={c.key} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:12,padding:"12px 14px",borderTop:`3px solid ${c.color}`}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>{c.icon} {c.label}</div>
              <div style={{fontSize:20,fontWeight:700,color:c.color}}>{latest[c.key]}<span style={{fontSize:11,fontWeight:400,color:"#94a3b8",marginLeft:3}}>{c.unit}</span></div>
              {c.normal&&<div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>BT: {c.normal}</div>}
              <div style={{fontSize:10,color:"#cbd5e1",marginTop:2}}>{fmt(latest.date)}</div>
            </div>
          ))}
        </div>
      )}

      {viewMode==="chart"&&chartData.length>1&&(
        <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:12,color:"#374151"}}>📈 Tăng trưởng theo thời gian</div>
          <div style={{overflowX:"auto"}}>
            <svg width={Math.max(500,chartData.length*90)} height={160} style={{display:"block"}}>
              {/* Height line */}
              {chartData.filter(d=>d.h).map((d,i,arr)=>{
                const x=(i/(arr.length-1||1))*(Math.max(500,chartData.length*90)-60)+30;
                const y=140-((d.h-70)/100)*120;
                return <g key={i}><circle cx={x} cy={y} r={4} fill="#3b82f6"/><text x={x} y={y-8} textAnchor="middle" fontSize={9} fill="#3b82f6">{d.h}</text><text x={x} y={155} textAnchor="middle" fontSize={9} fill="#94a3b8">{d.date.split("/").slice(0,2).join("/")}</text></g>;
              })}
              {/* Weight line */}
              {chartData.filter(d=>d.w).map((d,i,arr)=>{
                const x=(i/(arr.length-1||1))*(Math.max(500,chartData.length*90)-60)+30;
                const y=140-((d.w-5)/25)*120;
                return <g key={i}><circle cx={x} cy={y} r={4} fill="#8b5cf6"/><text x={x} y={y-8} textAnchor="middle" fontSize={9} fill="#8b5cf6">{d.w}kg</text></g>;
              })}

          <Inp label="Cơ sở y tế" value={form.facility} onChange={set("facility")}/>
          <Inp label="Bác sĩ thực hiện" value={form.doctor} onChange={set("doctor")}/>
          <Inp label="Gây mê / Vô cảm" value={form.anesthesia} onChange={set("anesthesia")}/>

// ── Search ───────────────────────────────────────────────────
const SearchPage = ({events,labs,imaging,vitals,allergies,vaccines,medications,procedures}) => {
  const [q,setQ] = useState("");
  const [res,setRes] = useState(null);
  const search = () => {
    if(!q.trim()){setRes(null);return;}
    const ql = q.toLowerCase();
    const m = (...ss) => ss.some(s=>(s||"").toLowerCase().includes(ql));
    setRes({
      events: events.filter(e=>m(e.title,e.chanDoan,e.diagnosis,e.facility,e.maICD10,e.doctor,e.lyDo)),
      labs: labs.filter(r=>m(r.panelName,r.facility,...(r.items||[]).map(i=>i.name))),
      imaging: imaging.filter(t=>m(t.title,t.conclusion,t.facility,t.doctor)),
      medications: (medications||[]).filter(md=>m(md.name,md.reason,md.prescriber)),
      allergies: (allergies||[]).filter(a=>m(a.allergen,a.allergyType,a.symptoms,a.icd10Code)),
      vaccines: (vaccines||[]).filter(v=>m(v.vaccineName,v.antigen,v.location)),
      procedures: (procedures||[]).filter(p=>m(p.procedureName,p.procedureCode,p.category,p.doctor,p.description)),
    });
  };
  const total = res?Object.values(res).reduce((a,v)=>a+v.length,0):0;
  const Chip = ({color,children}) => <span style={{fontSize:10,padding:"1px 8px",borderRadius:10,background:color+"20",color:color,fontWeight:600}}>{children}</span>;
  return (
    <div style={{padding:24,maxWidth:760}}>
      <h1 style={{fontSize:22,fontWeight:700,marginBottom:16}}>🔍 Tìm kiếm toàn bộ hồ sơ</h1>
      <div style={{background:"white",border:"1px solid #e2e8f0",borderRadius:12,padding:16,marginBottom:16,display:"flex",gap:10,alignItems:"flex-end"}}>
        <div style={{flex:1}}><Inp value={q} onChange={v=>{setQ(v);}} placeholder="Tìm chẩn đoán, ICD-10, tên thuốc, vắc xin, dị nguyên..."/></div>
        <Btn onClick={search}>🔍 Tìm</Btn>
        {res&&<Btn variant="outline" onClick={()=>{setQ("");setRes(null);}}>Xóa</Btn>}
      </div>
      {!res&&<div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8"}}>
        <div style={{fontSize:32,marginBottom:8}}>🔍</div>
        <div style={{fontSize:13}}>Tìm kiếm trên tất cả module: Đợt KCB, Thuốc, Dị ứng, Tiêm chủng, Xét nghiệm, CĐHA</div>
      </div>}
      {res&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{fontSize:13,color:"#64748b",fontWeight:600}}>Tìm thấy <strong style={{color:"#dc2626"}}>{total}</strong> kết quả cho "<em>{q}</em>"</div>
          
          {res.allergies.length>0&&(
            <div>
              <div style={{fontWeight:700,fontSize:12,color:"#f59e0b",marginBottom:8}}>⚠️ Dị ứng ({res.allergies.length})</div>
              {res.allergies.map(a=>(
                <div key={a.id} style={{background:"white",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}><Chip color="#f59e0b">{a.allergyType}</Chip><Chip color="#dc2626">{a.severity}</Chip></div>
                  <div style={{fontWeight:700,fontSize:13,marginTop:4}}>{a.allergen}</div>
                  {a.symptoms&&<div style={{fontSize:11,color:"#64748b"}}>{a.symptoms}</div>}
                </div>
              ))}
            </div>
          )}

          {res.events.length>0&&(
            <div>
              <div style={{fontWeight:700,fontSize:12,color:"#dc2626",marginBottom:8}}>🏥 Đợt KCB ({res.events.length})</div>
              {res.events.map(e=>{const ei=getET(e.type);return(
                <div key={e.id} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                  <div style={{display:"flex",gap:8,marginBottom:4}}><Chip color="#dc2626">{ei.label}</Chip><span style={{fontSize:11,color:"#94a3b8"}}>{fmt(e.date)}</span></div>
                  <div style={{fontWeight:700,fontSize:13}}>{e.title}</div>
                  {(e.chanDoan||e.diagnosis)&&<div style={{fontSize:11,color:"#7c3aed",fontStyle:"italic"}}>{e.chanDoan||e.diagnosis}</div>}
                  {e.maICD10&&<div style={{fontSize:10,color:"#94a3b8"}}>ICD-10: {e.maICD10}</div>}
                </div>
              );})}
            </div>
          )}

          {res.medications.length>0&&(
            <div>
              <div style={{fontWeight:700,fontSize:12,color:"#16a34a",marginBottom:8}}>💊 Thuốc ({res.medications.length})</div>
              {res.medications.map(md=>(
                <div key={md.id} style={{background:"white",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#166534"}}>{md.name}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>{md.dosage} · {md.reason}</div>
                </div>
              ))}
            </div>
          )}

          {res.procedures&&res.procedures.length>0&&(
            <div style={{marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:12,color:"#dc2626",marginBottom:8}}>🔪 Phẫu thuật/TT ({res.procedures.length})</div>
              {res.procedures.map(p=>(
                <div key={p.id} style={{background:"white",border:"1px solid #fecaca",borderRadius:8,padding:"8px 10px",marginBottom:4}}>
                  <div style={{fontWeight:600,fontSize:12}}>{p.procedureName}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>{fmt(p.datetime)} · {p.facility}</div>
                  {p.procedureCode&&<div style={{fontSize:10,color:"#94a3b8",fontFamily:"monospace"}}>Mã: {p.procedureCode}</div>}
                </div>
              ))}
            </div>
          )}
          {res.vaccines.length>0&&(
            <div>
              <div style={{fontWeight:700,fontSize:12,color:"#2563eb",marginBottom:8}}>💉 Tiêm chủng ({res.vaccines.length})</div>
              {res.vaccines.map(v=>(
                <div key={v.id} style={{background:"white",border:"1px solid #bfdbfe",borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:13,color:"#1d4ed8"}}>{v.vaccineName}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>{v.dose} · {fmt(v.date)} · {v.location}</div>
                </div>
              ))}
            </div>
          )}

          {res.labs.length>0&&(
            <div>
              <div style={{fontWeight:700,fontSize:12,color:"#0891b2",marginBottom:8}}>🔬 Siêu âm/XN ({res.labs.length})</div>
              {res.labs.map(r=>(
                <div key={r.id} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:13}}>{r.panelName}</div>
                  <div style={{fontSize:11,color:"#64748b"}}>{fmt(r.date)} · {r.facility}</div>
                </div>
              ))}
            </div>
          )}

          {res.imaging.length>0&&(
            <div>
              <div style={{fontWeight:700,fontSize:12,color:"#7c3aed",marginBottom:8}}>📷 CĐHA ({res.imaging.length})</div>
              {res.imaging.map(t=>(
                <div key={t.id} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 14px",marginBottom:6}}>
                  <div style={{fontWeight:700,fontSize:13}}>{t.title}</div>
                  {t.conclusion&&<div style={{fontSize:11,color:"#64748b"}}>{t.conclusion}</div>}
                </div>
              ))}

          )}

          {total===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#94a3b8"}}>Không tìm thấy kết quả phù hợp</div>}
        </div>
      )}
    </div>
  );
};

// ── AI Summary ───────────────────────────────────────────────
const SummaryPage = ({data}) => {
  const {profile,medications,vitals,allergies,vaccines,events,procedures,labs} = data||{};
  const [loading,setLoading] = useState(false);
  const [aiText,setAiText] = useState("");
  const [err,setErr] = useState("");
  const active = (medications||[]).filter(m=>m.isActive);
  const p = profile||{};
  const dob = p.dateOfBirth ? new Date(p.dateOfBirth) : null;
  const age  = dob ? Math.floor((Date.now()-dob)/(365.25*24*3600*1000)) : "?";
  const ageM = dob ? Math.floor(((Date.now()-dob)/(365.25*24*3600*1000)%1)*12) : "";
  const recentKCB = events?[...events].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3):[];
  const latestVital = vitals?.length?[...vitals].sort((a,b)=>b.date.localeCompare(a.date))[0]:null;
  const allergyAlert = allergies?.filter(a=>["Phản vệ","Nặng"].includes(a.severity)).map(a=>a.allergen).join(", ")||"Không có";
  const latestLab = labs?.length?[...labs].sort((a,b)=>b.date.localeCompare(a.date))[0]:null;
  const abnItems = latestLab?.items?.filter(i=>i.isAbnormal)||[];
  const ptList = (procedures||[]).sort((a,b)=>b.datetime.localeCompare(a.datetime)).slice(0,3);

  const genAI = async () => {
    setLoading(true);setErr("");setAiText("");
    try {
      const ctxLines = [
        "== HO SO SUC KHOE DIEN TU (QD 1332/QD-BYT) ==",
        "BN: "+(p.fullName||"Chua ro")+" | "+age+"t"+(ageM?ageM+"th":"")+" | "+(p.gender||"?")+" | Nhom mau "+(p.bloodType||"?"),
        "Dia chi: "+([p.diaChiQuanHuyen,p.diaChiTinhTP].filter(Boolean).join(", ")||"Chua co"),
        "Tien su: "+(p.tienSuBanThan||"Chua ghi nhan"),
        "",
        "I. PHAU THUAT / THU THUAT ("+ptList.length+" lan):",
      ];
      ptList.forEach(pt=>ctxLines.push("- "+(pt.datetime||"?")+" "+pt.procedureName+" | Ma: "+(pt.procedureCode||"N/A")+" | KQ: "+(pt.result||"?")));
      ctxLines.push("");
      ctxLines.push("II. CHI SO SONG (Lan gan nhat "+(latestVital?fmt(latestVital.date):"N/A")+"):");
      if(latestVital) ctxLines.push("CC: "+(latestVital.height||"?")+"cm | CN: "+(latestVital.weight||"?")+"kg | SpO2: "+(latestVital.spo2||"?")+"% | M: "+(latestVital.heartRate||"?")+"l/ph | HA: "+(latestVital.bloodPressureSys||"?")+"/"+(latestVital.bloodPressureDia||"?"));
      ctxLines.push("");
      ctxLines.push("III. CAN LAM SANG gan nhat:");
      if(latestLab){ ctxLines.push(latestLab.panelName+" ("+fmt(latestLab.date)+"):"); (latestLab.items||[]).forEach(it=>ctxLines.push("  "+it.name+": "+it.value+(it.unit||"")+(it.isAbnormal?" [BAT THUONG]":""))); }
      else ctxLines.push("Chua co");
      ctxLines.push("");
      ctxLines.push("IV. THUOC DANG DUNG:");
      active.forEach(m=>ctxLines.push("- "+m.name+": "+m.dosage+" — "+(m.reason||"")));
      if(!active.length) ctxLines.push("Khong co");
      ctxLines.push("");
      ctxLines.push("V. DI UNG: "+allergyAlert);
      ctxLines.push("VI. TIEM CHUNG: "+((vaccines||[]).length)+" mui");
      ctxLines.push("");
      ctxLines.push("VII. LICH SU KCB GAN DAY:");
      recentKCB.forEach(e=>ctxLines.push("- "+fmt(e.date)+": "+(e.chanDoan||e.title)+" | BS: "+(e.doctor||"N/A")));
      ctxLines.push("");
      ctxLines.push("== YEU CAU ==");
      ctxLines.push("Hay viet tom tat ho so benh an dien tu theo chuan BYT gom:");
      ctxLines.push("1. Tom tat benh su va can thiep da thuc hien");
      ctxLines.push("2. Tinh trang hien tai va cac van de can theo doi");
      ctxLines.push("3. Thuoc va phac do dang ap dung");
      ctxLines.push("4. Khuyen nghi theo doi va tai kham");
      ctxLines.push("Viet bang tieng Viet, ro rang, khach quan.");
      const context = ctxLines.join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:context}]})});
      const d = await res.json();
      if(d.content?.[0]?.text) setAiText(d.content[0].text);
      else setErr("Lỗi API: "+JSON.stringify(d));
    } catch(e) { setErr("Lỗi kết nối: "+e.message); }
    setLoading(false);
  };
  return (
    <div className="p-6" style={{maxWidth:800}}>
      <div className="flex justify-between items-center mb-4">
        <h1 className="text-2xl font-bold">🤖 AI Health Summary</h1>
        <Btn onClick={genAI} disabled={loading}>{loading?"⏳ Đang phân tích...":"✨ Tạo tóm tắt AI"}</Btn>
      </div>
      <div style={{background:"linear-gradient(to right,#b91c1c,#e11d48)",borderRadius:16,padding:16,color:"white",marginBottom:16}}>
        <div className="flex items-center gap-3">
          <div style={{width:44,height:44,background:"rgba(255,255,255,0.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>❤️</div>
          <div>
            <h2 className="font-bold">{p.fullName||"Chưa có thông tin"}</h2>
            <div style={{color:"#fecaca",fontSize:14}}>{age}t{ageM?ageM+"th":""} · {p.bloodType||"?"} · BHYT: {p.bhyt||"?"}</div>
            {p.tienSuBanThan&&<div style={{color:"#fca5a5",fontSize:12,marginTop:2}}>{p.tienSuBanThan.slice(0,80)}{p.tienSuBanThan.length>80?"...":""}</div>}
          </div>
        </div>
      </div>
      {(aiText||err||loading)&&(
        <Card className="p-4 mb-4 border-emerald-200 bg-emerald-50">
          <div className="font-semibold text-sm text-emerald-700 mb-2">🤖 Phân tích AI</div>
          {loading&&<p className="text-slate-500 text-sm">Đang phân tích...</p>}
          {err&&<p className="text-red-600 text-sm">{err}</p>}
          {aiText&&<p className="text-sm text-slate-700 leading-relaxed" style={{whiteSpace:"pre-line"}}>{aiText}</p>}
        </Card>
      )}
      {/* Chỉ số bất thường gần nhất */}
      {abnItems.length>0&&(
        <Card className="p-4 border-l-4 border-l-red-400 mb-3">
          <div className="font-semibold text-red-700 text-sm mb-2">⚠️ Chỉ số cần chú ý ({latestLab?.panelName})</div>
          <ul className="space-y-1 text-xs text-slate-700">{abnItems.map((it,i)=><li key={i}>⚠️ {it.name}: <strong>{it.value}{it.unit}</strong> (BT: {it.refRange||"?"})</li>)}</ul>
        </Card>
      )}
      {active.length>0&&(
        <Card className="p-4 border-l-4 border-l-emerald-400 mb-3">
          <div className="font-semibold text-emerald-700 text-sm mb-2">💊 Thuốc đang dùng ({active.length} loại)</div>
          <ul className="space-y-1 text-xs text-slate-700">{active.map((m,i)=><li key={i}>• {m.name} — {m.dosage}</li>)}</ul>
        </Card>
      )}
    </div>
  );
};

// ── Smart Upload Page ────────────────────────────────────────
const SmartUploadPage = ({setEvents, setLabs, setImaging, profile}) => {
  const [processing, setProcessing] = useState(false);
  const [results, setResults] = useState([]);
  const [saved, setSaved] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [overrideIdx, setOverrideIdx] = useState([]);

  const readB64 = (f) => new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(f); });
  const readURL = (f) => new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(f); });

  // Nén ảnh trước khi gửi API (tối đa 1200px, quality 0.8)
  const compressForUpload = (file) => new Promise((resolve) => {
    if (file.type === "application/pdf") { resolve(file); return; }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 1200;
      let {width: w, height: h} = img;
      if (w > MAX || h > MAX) {
        if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
        else        { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => resolve(blob || file), "image/jpeg", 0.8);
    };
    img.onerror = () => resolve(file);
    img.src = url;
  });

  const analyzeFile = async (file) => {
    const isPDF = file.type==="application/pdf";
    const isImage = file.type.startsWith("image/");
    if(!isPDF && !isImage) return {
      _file:file, _fileName:file.name, _dataUrl:"", category:"unknown", title:file.name,
      _error:`Định dạng không hỗ trợ (${file.type||"không xác định"}). Chỉ dùng JPG, PNG, PDF.`
    };

    // Kiểm tra kích thước — cảnh báo nếu > 10MB (trước nén)
    if (file.size > 10 * 1024 * 1024) return {
      _file:file, _fileName:file.name, _dataUrl:"", category:"unknown", title:file.name,
      _error:`File quá lớn (${(file.size/1024/1024).toFixed(1)}MB). Tối đa 10MB. Hãy chụp ảnh rõ hơn hoặc cắt bớt vùng không cần thiết.`
    };

    // Nén ảnh trước khi encode
    const compressed = isImage ? await compressForUpload(file) : file;
    const base64 = await readB64(compressed);
    const dataUrl = await readURL(compressed);
    const mediaType = isPDF ? "application/pdf" : "image/jpeg";
    const dob = profile?.dateOfBirth ? new Date(profile.dateOfBirth).toLocaleDateString("vi-VN") : "";
    const age = profile?.dateOfBirth ? Math.floor((Date.now()-new Date(profile.dateOfBirth))/(365.25*24*3600*1000)) : "";
    const name = profile?.fullName || "";

    const promptParts = [
      "Ban la tro ly y te doc tai lieu tieng Viet. Tra ve CHI JSON, khong co markdown, khong co giai thich.",
      "",
      "THONG TIN BENH NHAN HO SO CAN KIEM TRA:",
      "- Ho ten: "+name,
      "- Ngay sinh: "+dob+" ("+age+" tuoi)",
      "- Gioi tinh: "+(profile?.gender||"?"),
      "- Nhom mau: "+(profile?.bloodType||"?"),
      "",
      "Tra ve JSON voi cau truc:",
      '{"category":"labs|imaging|event|medication","confidence":0-100,"date":"YYYY-MM-DD","facility":"ten co so","doctor":"ten bac si","title":"tieu de ngan","diagnosis":"chan doan chinh","notes":"ghi chu",',
      '"labItems":[{"name":"","value":"","unit":"","refRange":"","isAbnormal":false}],',
      '"imagingType":"ULTRASOUND|CT|XRAY|MRI|ECG|OTHER","imagingConclusion":"ket luan hinh anh",',
      '"eventType":"VISIT|HOSPITALIZATION|SURGERY|VACCINATION|OTHER","summary":"tom tat 1-2 cau",',
      '"patientCheck":{"nameInDoc":"ten BN trong tai lieu","dobInDoc":"ngay sinh","genderInDoc":"gioi tinh","nameMatch":true,"dobMatch":true,"hasMismatch":false,"mismatchDetails":"mo ta"}}',
      "",
      "QUY TAC KIEM TRA BENH NHAN:",
      "- So sanh ten/ngay sinh/gioi tinh trong tai lieu voi thong tin ho so",
      "- Neu tai lieu khong co ten BN: nameInDoc=null, nameMatch=true",
      "- Neu ten khac nhau ro rang: hasMismatch=true",
      "",
      "TIEU CHUAN GIA TRI BINH THUONG (tre em):",
      "- Huyet hoc: Hb>11g/dL, BC 4-10K, TC 150-400K",
      "- Tim mach nhi: EF>55%, TP<25mmHg, TAPSE>17mm",
    ];
    const prompt = promptParts.join("\n");

    const msgContent = isPDF
      ? [{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:prompt}]
      : [{type:"image",source:{type:"base64",media_type:mediaType,data:base64}},{type:"text",text:prompt}];

    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,messages:[{role:"user",content:msgContent}]})
    });

    if (!res.ok) {
      const errBody = await res.text();
      const isRateLimit = res.status === 429;
      const isTooBig   = res.status === 413;
      throw new Error(
        isRateLimit ? "Quá giới hạn API (429). Hãy đợi vài giây rồi thử lại." :
        isTooBig    ? "File quá lớn để gửi lên API (413). Hãy dùng ảnh nhỏ hơn." :
        `Lỗi API ${res.status}: ${errBody.slice(0,120)}`
      );
    }

    const data = await res.json();
    if (data.error) throw new Error(`API: ${data.error.message||JSON.stringify(data.error)}`);

    const rawText = (data.content||[]).map(b=>b.text||"").join("").trim();
    if (!rawText) throw new Error("AI không trả về nội dung. Tài liệu có thể không đọc được (ảnh mờ, nghiêng, hoặc chỉ chứa hình vẽ).");

    // Robust JSON parse — thử nhiều cách
    let parsed = null;
    const attempts = [
      () => JSON.parse(rawText),
      () => JSON.parse(rawText.replace(/^`{3}[a-z]*/,"").replace(/`{3}$/,"").trim()),
      () => { const m = rawText.match(/\{[\s\S]*\}/); if(m) return JSON.parse(m[0]); throw 0; },
      () => { const s=rawText.indexOf("{"),e=rawText.lastIndexOf("}"); if(s>=0&&e>s) return JSON.parse(rawText.slice(s,e+1)); throw 0; },
    ];
    for (const fn of attempts) { try { parsed = fn(); break; } catch {} }

    if (!parsed) {
      // JSON bị cắt → stop_reason === max_tokens
      const stopReason = data.stop_reason || "";
      if (stopReason === "max_tokens") {
        throw new Error("Tài liệu quá dài, AI không đủ chỗ trả lời đầy đủ. Hãy cắt ảnh thành từng phần nhỏ hơn.");
      }
      throw new Error("Không đọc được kết quả từ AI. Ảnh có thể mờ, bị nghiêng, hoặc không phải tài liệu y tế.");
    }

    return {...parsed, _file:file, _dataUrl:dataUrl, _fileName:file.name};
  };

  const handleFiles = async (newFiles) => {
    const arr = Array.from(newFiles).filter(f=>f.type.startsWith("image/")||f.type==="application/pdf");
    if(!arr.length) return;
    setResults([]); setSaved([]); setOverrideIdx([]); setProcessing(true);
    const out = [];
    for(const f of arr){
      try { const r = await analyzeFile(f); if(r) out.push(r); }
      catch(e){
        const msg = e.message||"Lỗi không xác định";
        out.push({_file:f,_fileName:f.name,_error:msg,category:"unknown",title:f.name,
          _errorType: msg.includes("429")||msg.includes("giới hạn")?"rate_limit":
                      msg.includes("lớn")||msg.includes("413")?"too_large":
                      msg.includes("mờ")||msg.includes("đọc được")?"unreadable":"other"});
      }
    }
    setResults(out); setProcessing(false);
  };

  const isMismatch = (r) => r.patientCheck?.hasMismatch===true;

  const saveResult = (r, idx) => {
    const id = genId();
    const att = {name:r._fileName, dataUrl:r._dataUrl, type:r._file?.type};
    if(r.category==="labs"){
      setLabs(ls=>[...ls,{id,panelName:r.title||r._fileName,facility:r.facility||"",date:r.date||today(),
        notes:r.notes||r.diagnosis||"",items:(r.labItems||[]).map(x=>({...x})),attachments:[att]}]);
    } else if(r.category==="imaging"){
      setImaging(im=>[...im,{id,type:r.imagingType||"OTHER",title:r.title||r._fileName,date:r.date||today(),
        facility:r.facility||"",doctor:r.doctor||"",conclusion:r.imagingConclusion||r.diagnosis||"",
        notes:r.notes||"",attachments:[att]}]);
    } else {
      setEvents(ev=>[...ev,{id,type:r.eventType||"VISIT",title:r.title||r._fileName,date:r.date||today(),
        facility:r.facility||"",doctor:r.doctor||"",diagnosis:r.diagnosis||"",notes:r.notes||"",attachments:[att]}]);
    }
    setSaved(s=>[...s,idx]);
  };

  const saveAll = () => results.forEach((r,i)=>{
    if(!saved.includes(i)&&!r._error&&(!isMismatch(r)||overrideIdx.includes(i))) saveResult(r,i);
  });

  const canSaveAll = results.some((r,i)=>!saved.includes(i)&&!r._error&&(!isMismatch(r)||overrideIdx.includes(i)));
  const catColor = c=>({labs:"bg-purple-100 text-purple-700",imaging:"bg-orange-100 text-orange-700",event:"bg-blue-100 text-blue-700"}[c]||"bg-slate-100 text-slate-600");
  const catLabel = c=>({labs:"Siêu âm/XN",imaging:"CĐHA",event:"Sự kiện",medication:"Thuốc"}[c]||"Khác");
  const catEmoji = c=>({labs:"🔬",imaging:"📷",event:"📅",medication:"💊"}[c]||"📄");

  return (
    <div className="p-6" style={{maxWidth:900}}>
      <div className="mb-4">
        <h1 className="text-2xl font-bold">📤 Upload thông minh</h1>
        <p className="text-slate-500 text-sm mt-1">AI tự động đọc, xác minh bệnh nhân & phân loại vào đúng mục</p>
      </div>

      {/* Thông tin đang kiểm tra */}
      <div style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:12,padding:"10px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",fontSize:13}}>
        <span>🔒</span>
        <span style={{color:"#64748b"}}>Kiểm tra khớp với:</span>
        <strong style={{color:"#1e293b"}}>{profile?.fullName}</strong>
        <span style={{color:"#cbd5e1"}}>·</span>
        <span style={{color:"#64748b"}}>{profile?.dateOfBirth ? new Date(profile.dateOfBirth).toLocaleDateString("vi-VN") : ""}</span>
        <span style={{color:"#cbd5e1"}}>·</span>
        <span style={{color:"#64748b"}}>{profile?.gender} · {profile?.bloodType}</span>
      </div>

      {/* Drop Zone */}
      <div
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files);}}
        style={{border:`2px dashed ${dragOver?"#dc2626":"#cbd5e1"}`,borderRadius:16,padding:36,textAlign:"center",
          background:dragOver?"#fef2f2":"#f8fafc",transition:"all 0.2s",cursor:"pointer",marginBottom:20}}
        onClick={()=>document.getElementById("up-input").click()}>
        <input id="up-input" type="file" multiple accept="image/*,application/pdf"
          style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
        <div style={{fontSize:44,marginBottom:10}}>{dragOver?"📥":"📤"}</div>
        <div className="font-semibold text-slate-700">Kéo thả hoặc click để chọn file</div>
        <div className="text-sm text-slate-400 mt-1">JPG · PNG · PDF · Nhiều file cùng lúc</div>
      </div>

      {/* Processing */}
      {processing && (
        <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12,padding:16,marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:22,height:22,border:"3px solid #3b82f6",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite",flexShrink:0}}/>
          <div>
            <div className="font-semibold text-blue-700">AI đang phân tích & xác minh bệnh nhân...</div>
            <div className="text-xs text-blue-500 mt-0.5">Đọc nội dung · So sánh tên/ngày sinh · Trích xuất chỉ số</div>
          </div>
        </div>
      )}

      {/* Results */}
      {results.length > 0 && (
        <div>
          <div className="flex justify-between items-center mb-3">
            <div>
              <h2 className="font-bold text-lg">Kết quả ({results.length} file)</h2>
              {results.some(r=>isMismatch(r)) && (
                <p className="text-xs text-red-600 mt-0.5">🚨 Có file không khớp thông tin bệnh nhân — không thể lưu tự động</p>
              )}
            </div>
            {canSaveAll && <Btn onClick={saveAll}>✅ Lưu tất cả hợp lệ</Btn>}
          </div>

          <div className="space-y-4">
            {results.map((r,idx) => {
              const mismatch = isMismatch(r);
              const isOverride = overrideIdx.includes(idx);
              const isSaved = saved.includes(idx);
              const blocked = mismatch && !isOverride;
              const borderColor = isSaved ? "#6ee7b7" : blocked ? "#fca5a5" : "#e2e8f0";
              return (
                <div key={idx} style={{borderRadius:16,overflow:"hidden",border:`2px solid ${borderColor}`,background:"white"}}>

                  {/* Header */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",
                    borderBottom:"1px solid #f1f5f9",
                    background: isSaved?"#f0fdf4": blocked?"#fff1f2":"#f8fafc"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:24}}>{catEmoji(r.category)}</span>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                          <span className="font-bold text-sm">{r.title||r._fileName}</span>
                          <Badge color={catColor(r.category)}>{catLabel(r.category)}</Badge>
                          {r.confidence&&<Badge color="bg-slate-100 text-slate-500">{r.confidence}%</Badge>}
                          {isSaved&&<Badge color="bg-emerald-100 text-emerald-700">✓ Đã lưu</Badge>}
                          {blocked&&<Badge color="bg-red-100 text-red-700">🚨 Sai bệnh nhân</Badge>}
                          {mismatch&&isOverride&&<Badge color="bg-amber-100 text-amber-700">⚠️ Đã bỏ qua cảnh báo</Badge>}
                        </div>
                        <div className="text-xs text-slate-400 mt-0.5">
                          {r._fileName}{r.date&&` · ${fmt(r.date)}`}{r.facility&&` · ${r.facility}`}
                        </div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,flexShrink:0}}>
                      {!isSaved&&!r._error&&!blocked&&
                        <Btn size="sm" onClick={()=>saveResult(r,idx)}>💾 Lưu</Btn>}
                      {!isSaved&&!r._error&&blocked&&
                        <Btn size="sm" variant="outline" onClick={()=>setOverrideIdx(o=>[...o,idx])}>Bỏ qua & lưu</Btn>}
                      {blocked&&
                        <Btn size="sm" variant="danger" onClick={()=>setResults(rs=>rs.filter((_,i)=>i!==idx))}>🗑️ Xóa</Btn>}
                    </div>
                  </div>

                  {/* CẢNH BÁO KHÔNG KHỚP */}
                  {blocked && (
                    <div style={{background:"#fff1f2",borderBottom:"1px solid #fecaca",padding:"12px 16px"}}>
                      <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                        <span style={{fontSize:20,flexShrink:0}}>🚨</span>
                        <div style={{flex:1}}>
                          <div className="font-semibold text-red-700 text-sm mb-1">
                            Thông tin bệnh nhân KHÔNG KHỚP — Từ chối lưu tự động
                          </div>
                          <div className="text-red-600 text-xs mb-3">{r.patientCheck?.mismatchDetails}</div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                            <div style={{background:"white",border:"1px solid #fecaca",borderRadius:8,padding:"8px 10px",fontSize:12}}>
                              <div className="font-semibold text-slate-500 mb-1">📄 Trong tài liệu</div>
                              {r.patientCheck?.nameInDoc&&<div>Tên: <strong style={{color:"#dc2626"}}>{r.patientCheck.nameInDoc}</strong></div>}
                              {r.patientCheck?.dobInDoc&&<div>Ngày sinh: <strong style={{color:"#dc2626"}}>{r.patientCheck.dobInDoc}</strong></div>}
                              {r.patientCheck?.genderInDoc&&<div>Giới tính: <strong>{r.patientCheck.genderInDoc}</strong></div>}
                              {!r.patientCheck?.nameInDoc&&!r.patientCheck?.dobInDoc&&<div style={{color:"#9ca3af"}}>Không đọc được rõ</div>}
                            </div>
                            <div style={{background:"white",border:"1px solid #bbf7d0",borderRadius:8,padding:"8px 10px",fontSize:12}}>
                              <div className="font-semibold text-slate-500 mb-1">✅ Hồ sơ hiện tại</div>
                              <div>Tên: <strong style={{color:"#059669"}}>{profile?.fullName}</strong></div>
                              <div>Ngày sinh: <strong>{profile?.dateOfBirth?new Date(profile.dateOfBirth).toLocaleDateString("vi-VN"):""}</strong></div>
                              <div>Giới tính: <strong>{profile?.gender}</strong></div>
                            </div>
                          </div>
                          <div style={{marginTop:8,fontSize:11,color:"#ef4444"}}>
                            ⚠️ Vui lòng kiểm tra lại. Nếu đây là tài liệu của bệnh nhân khác, không nên lưu vào hồ sơ này.
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Nội dung trích xuất */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,padding:16}}>
                    {/* Preview */}
                    <div>
                      {r._dataUrl&&r._file?.type?.startsWith("image/") ? (
                        <img src={r._dataUrl} alt="preview"
                          style={{width:"100%",maxHeight:200,objectFit:"contain",borderRadius:8,border:"1px solid #e2e8f0",background:"#f1f5f9"}}/>
                      ) : r._file?.type==="application/pdf" ? (
                        <div style={{background:"#f1f5f9",borderRadius:12,padding:"24px 16px",textAlign:"center"}}>
                          <div style={{fontSize:40}}>📄</div>
                          <div style={{fontSize:13,fontWeight:500,color:"#475569",marginTop:8}}>{r._fileName}</div>
                          <div style={{fontSize:11,color:"#94a3b8"}}>PDF</div>
                        </div>
                      ) : null}
                      {r._error&&(
                        <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:12,marginTop:8}}>
                          <div style={{color:"#dc2626",fontSize:13,fontWeight:600}}>
                            {r._errorType==="rate_limit"?"⏳ Quá giới hạn API":
                             r._errorType==="too_large"?"📁 File quá lớn":
                             r._errorType==="unreadable"?"🔍 Không đọc được tài liệu":
                             "❌ Lỗi phân tích"}
                          </div>
                          <div style={{color:"#ef4444",fontSize:11,marginTop:4}}>{r._error}</div>
                        </div>
                      )}
                    </div>

                    {/* Thông tin */}
                    <div className="space-y-3">
                      {r.summary&&(
                        <div style={{background:"#eff6ff",border:"1px solid #dbeafe",borderRadius:10,padding:10}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#1d4ed8",marginBottom:4}}>🤖 AI Tóm tắt</div>
                          <div style={{fontSize:13,color:"#1e40af"}}>{r.summary}</div>
                        </div>
                      )}
                      {r.diagnosis&&(
                        <div>
                          <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4}}>Chẩn đoán / Kết luận</div>
                          <div style={{fontSize:13,color:"#334155",background:"#f8fafc",borderRadius:8,padding:8}}>{r.diagnosis}</div>
                        </div>
                      )}
                      {r.labItems&&r.labItems.length>0&&(
                        <div>
                          <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:4}}>
                            Chỉ số ({r.labItems.filter(x=>x.isAbnormal).length} bất thường)
                          </div>
                          <div style={{maxHeight:130,overflowY:"auto",display:"flex",flexDirection:"column",gap:3}}>
                            {r.labItems.map((x,i)=>(
                              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                                padding:"4px 8px",borderRadius:6,fontSize:11,
                                background:x.isAbnormal?"#fff1f2":"#f8fafc",

// ══════════════════════════════════════════════════════════════
//  FIREBASE SYNC LAYER — đồng bộ Firestore thay localStorage
//  localStorage vẫn dùng làm cache offline
// ══════════════════════════════════════════════════════════════
const db = () => window._db;
const fb = () => window._fbOps;

// Ghi document vào Firestore (async, không block UI)
const fsSet = async (collection, docId, data) => {
  if (!db()) return;
  try {
    await fb().setDoc(fb().doc(db(), collection, docId), data, {merge: true});
  } catch(e) { console.warn("fsSet error:", e.message); }
};

// Đọc document từ Firestore
const fsGet = async (col, docId) => {
  if (!db()) return null;
  try {
    const snap = await fb().getDoc(fb().doc(db(), col, docId));
    return snap.exists() ? snap.data() : null;
  } catch(e) { console.warn("fsGet error:", e.message); return null; }
};

// Xóa document
const fsDel = async (col, docId) => {
  if (!db()) return;
  try { await fb().deleteDoc(fb().doc(db(), col, docId)); }
  catch(e) { console.warn("fsDel error:", e.message); }
};

// Lấy tất cả documents trong collection
const fsGetAll = async (col) => {
  if (!db()) return [];
  try {
    const snap = await fb().getDocs(fb().collection(db(), col));
    return snap.docs.map(d => ({id: d.id, ...d.data()}));
  } catch(e) { console.warn("fsGetAll error:", e.message); return []; }
};

// Sync indicator
let _syncPending = 0;
const syncStart = () => { _syncPending++; window._syncStatus && window._syncStatus(true); };
const syncDone  = () => { _syncPending = Math.max(0,_syncPending-1); if(!_syncPending) window._syncStatus && window._syncStatus(false); };

// ── Firebase-backed saveUserToLS ──────────────────────────────
const saveUserToFirebase = async (uid, user, data) => {
  syncStart();
  try {
    await fsSet("users", uid, {user: JSON.stringify(user), data: JSON.stringify(data||{}), updatedAt: new Date().toISOString()});
  } finally { syncDone(); }
};

// ── Firebase-backed saveDoctorToLS ────────────────────────────
const saveDoctorToFirebase = async (doc_data) => {
  syncStart();
  try {
    await fsSet("doctors", doc_data.uid, {...doc_data, updatedAt: new Date().toISOString()});
  } finally { syncDone(); }
};

// ── Firebase-backed saveConsultsToLS ─────────────────────────
const saveConsultsToFirebase = async (patientUid, consults) => {
  syncStart();
  try {
    await fsSet("consults", patientUid, {consults: JSON.stringify(consults), updatedAt: new Date().toISOString()});
  } finally { syncDone(); }
};

// ── Firebase-backed saveRequestsToLS ─────────────────────────
const saveRequestsToFirebase = async (patientUid, reqs) => {
  syncStart();
  try {
    await fsSet("requests", patientUid, {requests: JSON.stringify(reqs), updatedAt: new Date().toISOString()});
  } finally { syncDone(); }
};

// ── Load toàn bộ data từ Firebase khi app khởi động ──────────
const loadAllFromFirebase = async () => {
  if (!db()) return false;
  try {
    console.log("🔄 Loading data from Firebase...");
    // Load users
    const users = await fsGetAll("users");
    users.forEach(item => {
      try {
        const user = JSON.parse(item.user || "{}");
        const data = JSON.parse(item.data || "{}");
        if (user.uid && user.uid !== DEMO_USER.uid && user.uid !== "admin_system") {
          USER_DB[user.uid] = user;
          SESSION_DATA[user.uid] = data;
          // Cũng lưu vào localStorage làm cache
          try { localStorage.setItem(LS_PREFIX+user.uid, JSON.stringify({user,data})); } catch(e){}
        }
      } catch(e) {}
    });
    // Load doctors
    const docs = await fsGetAll("doctors");
    docs.forEach(d => {
      if (d.uid) {
        DOCTOR_DB[d.uid] = d;
        try { localStorage.setItem(LS_DOCTOR_PREFIX+d.uid, JSON.stringify(d)); } catch(e){}
      }
    });
    // Load consults
    const consultItems = await fsGetAll("consults");
    consultItems.forEach(item => {
      try {
        const consults = JSON.parse(item.consults || "[]");
        const patUid = item.id;
        try { localStorage.setItem(LS_CONSULT_PREFIX+patUid, JSON.stringify(consults)); } catch(e){}
        if (SESSION_DATA[patUid]) SESSION_DATA[patUid].consults = consults;
      } catch(e) {}
    });
    // Load requests
    const reqItems = await fsGetAll("requests");
    reqItems.forEach(item => {
      try {
        const reqs = JSON.parse(item.requests || "[]");
        const patUid = item.id;
        try { localStorage.setItem(LS_CREQUEST_PREFIX+patUid, JSON.stringify(reqs)); } catch(e){}
      } catch(e) {}
    });
    console.log("✅ Firebase data loaded:", users.length, "users,", docs.length, "doctors");
    return true;
  } catch(e) {
    console.warn("Firebase load failed, using localStorage:", e.message);
    return false;
  }
};

// ── Doctor DB (lưu trong localStorage riêng) ─────────────────
const LS_DOCTOR_PREFIX = "phr_doctor_";
const LS_DOCTOR_INDEX  = "phr_doctor_index";
const LS_CONSULT_PREFIX  = "phr_consult_";    // consults per patient uid
const LS_CREQUEST_PREFIX = "phr_crequest_"; // consultation requests per patient uid

const saveRequestsToLS = (patientUid, reqs) => {
  try { localStorage.setItem(LS_CREQUEST_PREFIX+patientUid, JSON.stringify(reqs)); } catch(e) {}
  // Sync to Firebase
  saveRequestsToFirebase(patientUid, reqs);
};
const loadRequestsFromLS = (patientUid) => {
  try { return JSON.parse(localStorage.getItem(LS_CREQUEST_PREFIX+patientUid)||"[]"); } catch(e) { return []; }
};
// Load tất cả requests của TẤT CẢ bệnh nhân (cho bác sĩ xem)
const loadAllRequests = () => {
  const all = [];
  try {
    const keys = Object.keys(localStorage).filter(k=>k.startsWith(LS_CREQUEST_PREFIX));
    keys.forEach(k => {
      const uid = k.replace(LS_CREQUEST_PREFIX,"");
      const reqs = JSON.parse(localStorage.getItem(k)||"[]");
      reqs.forEach(r => all.push({...r, patientUid: uid}));
    });
  } catch(e) {}
  return all.sort((a,b)=>(b.createdAt||"").localeCompare(a.createdAt||""));
};

const DOCTOR_DB = {}; // uid → doctorUser

// Khôi phục doctors từ localStorage
(function restoreDoctorsFromLS() {
  try {
    const index = JSON.parse(localStorage.getItem(LS_DOCTOR_INDEX)||"[]");
    index.forEach(uid => {
      try {
        const raw = localStorage.getItem(LS_DOCTOR_PREFIX+uid);
        if (raw) { const d = JSON.parse(raw); if(d.uid) DOCTOR_DB[uid] = d; }
      } catch(e) {}
    });
  } catch(e) {}
})();

const saveDoctorToLS = (doc) => {
  try {
    localStorage.setItem(LS_DOCTOR_PREFIX+doc.uid, JSON.stringify(doc));
    const idx = JSON.parse(localStorage.getItem(LS_DOCTOR_INDEX)||"[]");
    if (!idx.includes(doc.uid)) { idx.push(doc.uid); localStorage.setItem(LS_DOCTOR_INDEX, JSON.stringify(idx)); }
    // Sync to Firebase
    saveDoctorToFirebase(doc);
  } catch(e) {}
};

const removeDoctorFromLS = (uid) => {
  try {
    localStorage.removeItem(LS_DOCTOR_PREFIX+uid);
    const idx = JSON.parse(localStorage.getItem(LS_DOCTOR_INDEX)||"[]");
    localStorage.setItem(LS_DOCTOR_INDEX, JSON.stringify(idx.filter(x=>x!==uid)));
    fsDel("doctors", uid);
  } catch(e) {}
};

      if (!doc) { setErr("Mã chứng chỉ hành nghề hoặc mật khẩu không đúng."); setLoading(false); return; }

          <h1 style={{fontSize:20,fontWeight:800,margin:"0 0 4px",color:"#0f172a"}}>Cổng Bác Sĩ</h1>
          <p style={{fontSize:12,color:"#64748b",margin:0}}>Đăng nhập bằng mã CCHN hoặc email</p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,fontWeight:700,color:"#374151",display:"block",marginBottom:4}}>Mã CCHN / Email</label>
          <input value={uid} onChange={e=>setUid(e.target.value)}

            style={{width:"100%",padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:9,fontSize:13,outline:"none",boxSizing:"border-box"}}/>

      setErr("Mã CCHN này đã được đăng ký"); return;
    }
    const uid = "doc_" + Date.now();

      uid, role:"doctor", isDoctor:true,

      licenseNumber: license.trim(),
      specialty: specialty.trim(),
      workplace: workplace.trim(),
      email: email.trim().toLowerCase(),
      phone: phone.trim(),
      passwordHash: hashPass(pwd),
      status: "pending",

    saveDoctorToLS(doc);

      </div>

  );

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e3a5f)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"white",borderRadius:20,padding:28,maxWidth:440,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:52,height:52,background:"linear-gradient(135deg,#0369a1,#0284c7)",borderRadius:14,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:24,marginBottom:8}}>👨‍⚕️</div>
          <h1 style={{fontSize:18,fontWeight:800,margin:"0 0 3px",color:"#0f172a"}}>Đăng ký Tài khoản Bác sĩ</h1>
          <p style={{fontSize:11,color:"#64748b",margin:0}}>Sau khi đăng ký Admin sẽ xét duyệt và cấp quyền truy cập hồ sơ</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <div style={{gridColumn:"1/-1"}}>{inp("Họ và tên bác sĩ", fullName, setFullName, {required:true, placeholder:"BS. Nguyễn Văn A"})}</div>
          {inp("Mã CCHN", license, setLicense, {required:true, placeholder:"001-2-240123"})}
          {inp("Chuyên khoa", specialty, setSpecialty, {placeholder:"Tim mạch nhi, Nhi khoa..."})}
          <div style={{gridColumn:"1/-1"}}>{inp("Nơi công tác", workplace, setWorkplace, {placeholder:"BV Nhi Đồng 1 / PK gia đình..."})}</div>
          {inp("Email", email, setEmail, {type:"email", placeholder:"bsnguyena@gmail.com"})}
          {inp("Số điện thoại", phone, setPhone, {placeholder:"0909xxxxxx"})}
          {inp("Mật khẩu", pwd, setPwd, {type:"password", required:true, placeholder:"Tối thiểu 6 ký tự"})}
          {inp("Xác nhận mật khẩu", pwd2, setPwd2, {type:"password", required:true, placeholder:"Nhập lại mật khẩu"})}
        </div>
        {err && <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#dc2626"}}>⚠️ {err}</div>}
        <div style={{display:"flex",gap:8,marginTop:4}}>

          <button onClick={doRegister} style={{flex:2,padding:10,background:"linear-gradient(135deg,#0369a1,#0284c7)",color:"white",border:"none",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(3,105,161,0.3)"}}>📝 Gửi đăng ký</button>
        </div>
      </div>
    </div>
  );
};

// ── DoctorApp — giao diện bác sĩ xem hồ sơ + tư vấn ─────────
const DoctorApp = ({doctor, onLogout}) => {
  const [selPatientUid, setSelPatientUid] = React.useState(null);
  const [patientData, setPatientData] = React.useState(null);
  const [consults, setConsults] = React.useState([]);
  const [newMsg, setNewMsg] = React.useState("");
  const [docPage, setDocPage] = React.useState("overview"); // overview|events|labs|imaging|meds|vitals|consult
  const [saving,    setSaving]    = React.useState(false);
  const [savedOk,   setSavedOk]   = React.useState(false);
  const [allRequests,  setAllRequests]  = React.useState(loadAllRequests()); // yêu cầu từ BN
  const [aiLoading,    setAiLoading]    = React.useState(false);
  const [aiSummary,    setAiSummary]    = React.useState("");
  const [aiErr,        setAiErr]        = React.useState("");
  const [aiDraft,      setAiDraft]      = React.useState("");
  const [draftEditing, setDraftEditing] = React.useState(false); // đang soạn thảo
  const [showPdf,      setShowPdf]      = React.useState(false); // preview PDF
  const fmt = d => d ? new Date(d).toLocaleDateString("vi-VN") : "—";

  // Load patient khi chọn
  const loadPatient = (uid) => {
    setSelPatientUid(uid);
    setDocPage("overview");
    setNewMsg("");
    // Đọc data từ SESSION_DATA hoặc SEED
    let d = SESSION_DATA[uid] || {};
    if (uid === DEMO_USER.uid) {
      d = { profile:SEED_PROFILE, events:SEED_EVENTS, labs:SEED_LABS,
            imaging:SEED_IMAGING, medications:SEED_MEDS, vitals:SEED_VITALS,
            allergies:SEED_ALLERGIES, vaccines:SEED_VACCINES };
    }
    setPatientData(d);
    setConsults(loadConsultsFromLS(uid));
    setAllRequests(loadAllRequests());
    setAiSummary(""); setAiErr(""); setAiDraft(""); setDraftEditing(false); setNewMsg(""); setShowPdf(false);
  };

  // ── Tạo context hồ sơ cho AI ───────────────────────────────
  const buildPatientContext = () => {
    if (!patientData) return "";
    const pr = patientData.profile || {};
    const ev = patientData.events || [];
    const lb = patientData.labs || [];
    const im = patientData.imaging || [];
    const md = patientData.medications || [];
    const vt = patientData.vitals || [];
    const al = patientData.allergies || [];
    const pt = patientData.procedures || [];
    const dob = pr.dateOfBirth ? new Date(pr.dateOfBirth) : null;
    const age = dob ? Math.floor((Date.now()-dob)/(365.25*24*3600*1000)) : "?";
    const ageM = dob ? Math.floor(((Date.now()-dob)/(365.25*24*3600*1000)%1)*12) : "";
    const fD = d => d ? new Date(d).toLocaleDateString("vi-VN") : "?";
    const srt = arr => [...arr].sort((a,b)=>(b.date||b.datetime||"").localeCompare(a.date||a.datetime||""));
    const NL = "\n";

    const lines = [];
    lines.push("== HO SO SUC KHOE BENH NHAN ==");
    lines.push("Ho ten: "+(pr.fullName||"?")+" | "+age+"t"+(ageM?ageM+"th":"")+" | "+(pr.gender||"?")+" | Nhom mau: "+(pr.bloodType||"?")+" | BHYT: "+(pr.bhyt||"?"));
    lines.push("Dia chi: "+([pr.diaChiQuanHuyen,pr.diaChiTinhTP].filter(Boolean).join(", ")||"?"));
    lines.push("Tien su ban than: "+(pr.tienSuBanThan||"Chua ghi nhan"));
    lines.push("Tien su gia dinh: "+(pr.tienSuGiaDinh||"Chua ghi nhan"));
    lines.push("");

    lines.push("== DI UNG ("+al.length+") ==");
    if (al.length===0) lines.push("Khong co");
    else al.forEach(a=>lines.push("- "+a.allergen+" ["+a.severity+"]: "+(a.symptoms||"")));
    lines.push("");

    lines.push("== PHAU THUAT / THU THUAT ("+pt.length+") ==");
    if (pt.length===0) lines.push("Chua co");
    else srt(pt).forEach(p=>{
      lines.push("- "+fD(p.datetime)+": "+p.procedureName+" tai "+(p.facility||"?")+" (BS. "+(p.doctor||"?")+")");
      lines.push("  Ket qua: "+(p.result||"?")+" | Bien chung: "+(p.complications||"khong"));
    });
    lines.push("");

    lines.push("== DOT KCB GAN NHAT ("+ev.length+" dot, hien thi 5 gan nhat) ==");
    if (ev.length===0) lines.push("Chua co");
    else srt(ev).slice(0,5).forEach(e=>{
      lines.push("- "+fD(e.date)+": "+(e.title||e.chanDoan||"?")+" tai "+(e.facility||"?"));
      lines.push("  CD: "+(e.chanDoan||"?")+" | ICD: "+(e.maICD10||"?")+" | Dieu tri: "+(e.tomTatPPDieuTri||e.tomTatBenhSu||"?"));
    });
    lines.push("");

    lines.push("== XET NGHIEM GAN NHAT ==");
    const recentLabs = srt(lb).slice(0,2);
    if (recentLabs.length===0) lines.push("Chua co");
    else recentLabs.forEach(l=>{
      lines.push(l.panelName+" ("+fD(l.date)+"):");
      (l.items||[]).forEach(it=>lines.push("  "+it.name+": "+it.value+(it.unit||"")+" (BT:"+(it.refRange||"?")+") "+(it.isAbnormal?"[BAT THUONG]":"")));
    });
    lines.push("");

    lines.push("== CDHA GAN NHAT ==");
    const recentIm = srt(im).slice(0,2);
    if (recentIm.length===0) lines.push("Chua co");
    else recentIm.forEach(i=>{ lines.push("- "+fD(i.date)+": "+i.title+" ("+i.type+")"); lines.push("  Ket luan: "+(i.conclusion||"?")); });
    lines.push("");

    lines.push("== THUOC DANG DUNG ==");
    const activeMeds = md.filter(m=>m.isActive);
    if (activeMeds.length===0) lines.push("Khong co");
    else activeMeds.forEach(m=>lines.push("- "+m.name+" "+m.dosage+" "+m.frequency+" ("+( m.reason||"?")+")"));
    lines.push("");

    lines.push("== CHI SO SK GAN NHAT ==");
    const lv = srt(vt)[0];
    if (!lv) lines.push("Chua co");
    else lines.push(fD(lv.date)+": CC "+(lv.height||"?")+"cm CN "+(lv.weight||"?")+"kg SpO2 "+(lv.spo2||"?")+"% M "+(lv.heartRate||"?")+"l/ph HA "+(lv.bloodPressureSys||"?")+"/"+(lv.bloodPressureDia||"?")+" T "+(lv.temperature||"?")+"°C");
    lines.push("");

    lines.push("== TU VAN CU ("+consults.length+") ==");
    const recentC = [...consults].slice(-3);
    if (recentC.length===0) lines.push("Chua co");
    else recentC.forEach(c=>lines.push("["+new Date(c.createdAt).toLocaleDateString("vi-VN")+"] BS."+c.doctorName+": "+c.message.slice(0,200)));

    return lines.join("\n");
  };

  // ── Gọi AI tóm tắt toàn bộ hồ sơ ────────────────────────────
  const genAISummary = async () => {
    setAiLoading(true); setAiErr(""); setAiSummary("");
    try {
      const ctx = buildPatientContext();
      const prompt = [
        "Phan tich toan dien ho so benh nhan sau va cung cap:",
        "1. TOM TAT TINH TRANG — Chan doan chinh, tien trien, muc do",
        "2. DIEM DANG CHU Y — Ket qua bat thuong, xu huong xau di/tot len",
        "3. THUOC & TUONG TAC — Danh gia phac do hien tai, co do",
        "4. KHUYEN NGHI THEO DOI — Xet nghiem/CDHA can thuc hien, tan suat tai kham",
        "5. CAU HOI GOI Y — 3-5 cau hoi bac si nen hoi BN/gia dinh khi gap",
        "",
        ctx
      ].join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:2000,
          system:"Ban la AI ho tro bac si danh gia ho so benh nhan. Phan tich khach quan, ngan gon, dung chuyen mon. Tra loi bang tieng Viet, dung markdown voi cac muc ro rang.",
          messages:[{role:"user", content:prompt}]
        })
      });
      if (!res.ok) throw new Error("API "+res.status);
      const data = await res.json();
      setAiSummary((data.content||[]).map(b=>b.text||"").join("").trim());
    } catch(e) {
      setAiErr(e.message||"Loi khong xac dinh");
    }
    setAiLoading(false);
  };

  const DISCLAIMER = "\n\n---\n⚠️ LƯU Ý QUAN TRỌNG: Nội dung thư tư vấn này do AI tổng hợp/đề xuất dựa trên dữ liệu hồ sơ được cung cấp. Thông tin có thể không đầy đủ hoặc không chính xác. Bác sĩ chịu trách nhiệm chuyên môn và cần xem xét kỹ, chỉnh sửa theo nhận định lâm sàng thực tế trước khi gửi cho gia đình bệnh nhân.";

  const genAIDraft = async () => {
    setAiLoading(true); setAiErr(""); setAiDraft("");
    try {
      const ctx = buildPatientContext();
      const today = new Date().toLocaleDateString("vi-VN");
      const prompt = [
        "Soan thao 'THU TU VAN SUC KHOE' (khong ghi tieu de nay vao thu, tu van su dung tieu de: Thu Tu Van Suc Khoe) gui cho gia dinh benh nhan.",
        "Thu ngan gon 200-300 tu, gom 4 phan chinh:",
        "1. TINH TRANG HIEN TAI: Tom tat dua tren ho so (neu ro day la tong hop tu ho so, co the thieu thong tin)",
        "2. NHUNG DIEM CAN LUU Y: Cac dau hieu can theo doi tai nha",
        "3. KHUYEN NGHI: Tai kham, xet nghiem tiep theo (ghi ro day la de xuat, bac si se quyet dinh)",
        "4. LOI DONG VIEN: Ngan gon, chan thanh",
        "",
        "Bac si ky ten: "+doctor.fullName+" | "+( doctor.specialty||"")+" | "+(doctor.workplace||"")+" | Ngay: "+today,
        "",
        ctx
      ].join("\n");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1800,
          system:"Ban la AI ho tro soan thao 'Thu Tu Van Suc Khoe' bang tieng Viet cho gia dinh benh nhan nhi. Van phong chuyen nghiep, am ap, de hieu. KHONG tu y them chan doan hay ket luan y te ngoai du lieu ho so. KHONG dung tieu de 'Thu Tu Van Suc Khoe' trong noi dung - chi soan noi dung thu. KHONG them disclaimer vao thu vi se them o ngoai.",
          messages:[{role:"user", content:prompt}]
        })
      });
      if (!res.ok) throw new Error("API "+res.status);
      const data = await res.json();
      const draft = (data.content||[]).map(b=>b.text||"").join("").trim();
      // Thêm disclaimer bắt buộc
      setAiDraft(draft + DISCLAIMER);
      setNewMsg(draft + DISCLAIMER);
      setDraftEditing(true);
      setDocPage("consult");
    } catch(e) {
      setAiErr(e.message||"Loi khong xac dinh");
    }
    setAiLoading(false);
  };

  // ── Export PDF thu tu van ──────────────────────────────────────
  const exportConsultPDF = (msgText) => {
    const today = new Date().toLocaleDateString("vi-VN");
    const p = patientData?.profile || {};
    const dobStr = p.dateOfBirth ? new Date(p.dateOfBirth).toLocaleDateString("vi-VN") : "?";
    const age = p.dateOfBirth ? Math.floor((Date.now()-new Date(p.dateOfBirth))/(365.25*24*3600*1000)) : "?";
    const discIdx = msgText.indexOf("\n\n---\n");
    const mainContent = discIdx >= 0 ? msgText.slice(0, discIdx) : msgText;
    const fmtContent = mainContent.split("\n").map(function(l) {
      if (!l.trim()) return "<br/>";
      if (l.match(/^\d+\./)) return "<p style=\"margin:6px 0;font-weight:600\">"+l+"</p>";
      l = l.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      return "<p style=\"margin:4px 0\">"+l+"</p>";
    }).join("");
    const css = [
      "body{font-family:'Times New Roman',serif;font-size:13pt;margin:0;padding:0;color:#1a1a1a}",
      ".page{width:21cm;min-height:29.7cm;margin:0 auto;padding:2.5cm 2.5cm 3cm;box-sizing:border-box}",
      ".hdr{text-align:center;border-bottom:2px solid #0c4a6e;padding-bottom:14px;margin-bottom:20px}",
      ".hdr h1{font-size:16pt;color:#0c4a6e;margin:0 0 4px;text-transform:uppercase;letter-spacing:1px}",
      ".hdr p{font-size:10pt;color:#64748b;margin:2px 0}",
      ".ptbox{background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;padding:10px 14px;margin-bottom:18px}",
      ".ptbox table{width:100%;border-collapse:collapse;font-size:11pt}",
      ".ptbox td{padding:3px 8px;vertical-align:top}",

      ".content{font-size:12pt;line-height:1.8;min-height:300px}",
