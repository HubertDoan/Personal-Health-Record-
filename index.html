      "@media print{.page{margin:0;padding:2cm 2.5cm 3cm}body{-webkit-print-color-adjust:exact}}"
    ].join("\n");
    const rows = [
      "<tr><td>B\u1ec7nh nh\u00e2n:</td><td><strong>"+(p.fullName||"?")+"</strong></td><td>Ng\u00e0y sinh:</td><td>"+dobStr+" ("+age+" tu\u1ed5i)</td></tr>",
      "<tr><td>Gi\u1edbi t\u00ednh:</td><td>"+(p.gender||"?")+"</td><td>Nh\u00f3m m\u00e1u:</td><td>"+(p.bloodType||"?")+"</td></tr>",
      "<tr><td>BHYT:</td><td>"+(p.bhyt||"?")+"</td><td></td><td></td></tr>"
    ].join("");
    const sigLines = [
      "<div class=\"title\">B\u00e1c s\u0129 t\u01b0 v\u1ea5n</div>",
      "<div class=\"line\">",
      "<div class=\"name\">"+doctor.fullName+"</div>",
      "<div class=\"detail\">"+(doctor.specialty||"")+"</div>",
      "<div class=\"detail\">"+(doctor.workplace||"")+"</div>",
      "<div class=\"detail\">CCHN: "+doctor.licenseNumber+"</div>",
      "</div>"
    ].join("");
    const htmlParts = [
      "<!DOCTYPE html><html><head><meta charset='UTF-8'>",
      "<style>"+css+"</style></head><body>",
      "<div class='page'>",
      "<div class='hdr'>",
      "<h1>Th\u01b0 T\u01b0 V\u1ea5n S\u1ee9c Kh\u1ecfe</h1>",
      "<p>D\u1ef1a tr\u00ean h\u1ed3 s\u01a1 \u0111i\u1ec7n t\u1eed \u0111\u01b0\u1ee3c cung c\u1ea5p v\u00e0 kinh nghi\u1ec7m th\u1ef1c ti\u1ec5n</p>",
      "<p style='color:#94a3b8;font-size:9pt'>Ng\u00e0y: "+today+"</p>",
      "</div>",
      "<div class='ptbox'><table>"+rows+"</table></div>",
      "<div class='content'>"+fmtContent+"</div>",
      "<div class='disc'>",
      "<strong>&#9888; LÙU Ý QUAN TRỌNG:</strong> Nọi dung thŭ tŭ ván này do AI tỏng họp/đè xuát dụa trên dữ liẹu hô sõ được cung cáp. Thóng tin có thẻ không đày đủ hoạc không chính xác. Bác sĩ chịu trách nhiẹm chuyên môn và đã xác nhạn nọi dung này trưóc khi ký tên.",
      "</div>",
      "<div class='sig'><div class='sigbox'>"+sigLines+"</div></div>",
      "</div></body></html>"
    ].join("");
    // Dùng blob URL tránh popup bị chặn
    const blob = new Blob([htmlParts], {type:"text/html;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:21cm;height:29.7cm;border:none;";
    document.body.appendChild(iframe);
    iframe.onload = function() {
      try {
        iframe.contentWindow.focus();
        iframe.contentWindow.print();
      } catch(e) {
        window.open(url, "_blank");
      }
      setTimeout(function(){ document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 3000);
    };
    iframe.src = url;
  };

  // Đánh dấu yêu cầu tư vấn BN là đã xử lý
  const markRequestAnswered = (reqId, patientUid) => {
    const reqs = loadRequestsFromLS(patientUid);
    const updated = reqs.map(r => r.id===reqId ? {...r, status:"answered", answeredAt: new Date().toISOString(), answeredBy: doctor.fullName} : r);
    saveRequestsToLS(patientUid, updated);
    setAllRequests(loadAllRequests());
  };

  const sendConsult = () => {
    if (!newMsg.trim()) return;
    setSaving(true);
    const c = {
      id: "con_"+Date.now(),
      doctorUid: doctor.uid,
      doctorName: doctor.fullName,
      doctorSpec: doctor.specialty,
      doctorWork: doctor.workplace,
      message: newMsg.trim(),
      createdAt: new Date().toISOString(),
      type: "consult", // consult | prescription | note
    };
    const updated = [...consults, c];
    setConsults(updated);
    saveConsultsToLS(selPatientUid, updated);
    // Cũng lưu vào SESSION_DATA để bệnh nhân thấy
    if (!SESSION_DATA[selPatientUid]) SESSION_DATA[selPatientUid] = {};
    SESSION_DATA[selPatientUid].consults = updated;
    if (selPatientUid !== DEMO_USER.uid) {
      const user = USER_DB[selPatientUid];
      if (user) saveUserToLS(selPatientUid, user, SESSION_DATA[selPatientUid]);
    }
    setNewMsg("");
    setSaving(false);
    setSavedOk(true);
    setTimeout(()=>setSavedOk(false), 2000);
  };

  const accessible = doctor.accessiblePatients || [];
  const patients = Object.values(USER_DB)
    .filter(u => !u.isAdmin && (accessible.includes(u.uid) || accessible.includes("all")))
    .concat(accessible.includes(DEMO_USER.uid)||accessible.includes("all") ? [DEMO_USER] : []);

  const p = patientData?.profile || {};
  const dob = p.dateOfBirth ? new Date(p.dateOfBirth) : null;
  const age = dob ? Math.floor((Date.now()-dob)/(365.25*24*3600*1000)) : "?";

  const NavBtn = ({id, label, emoji}) => (
    <button onClick={()=>setDocPage(id)}
      style={{padding:"7px 12px",border:"none",borderBottom:`2px solid ${docPage===id?"#0369a1":"transparent"}`,
        background:"none",color:docPage===id?"#0369a1":"#64748b",fontWeight:docPage===id?700:400,
        fontSize:12,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
      {emoji} {label}
    </button>
  );

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#f0f9ff",fontFamily:"system-ui,sans-serif"}}>
      {/* Sidebar bác sĩ */}
      <aside style={{width:220,minHeight:"100vh",background:"#0c4a6e",color:"white",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"16px 14px 12px",borderBottom:"1px solid #0e7490"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:34,height:34,background:"linear-gradient(135deg,#0369a1,#0ea5e9)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>👨‍⚕️</div>
            <div>
              <div style={{fontWeight:800,fontSize:12,lineHeight:1.2}}>Cổng Bác Sĩ</div>
              <div style={{fontSize:9,color:"#7dd3fc"}}>SSK Điện Tử</div>
            </div>
          </div>
          <div style={{background:"#0e4d6e",borderRadius:9,padding:"8px 10px"}}>
            <div style={{fontSize:12,fontWeight:700,color:"white",marginBottom:1}}>BS. {doctor.fullName}</div>
            <div style={{fontSize:10,color:"#7dd3fc"}}>{doctor.specialty||"Bác sĩ"}</div>
            <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{doctor.workplace}</div>
          </div>
        </div>

        <div style={{flex:1,padding:"10px 8px",overflowY:"auto"}}>
          <div style={{fontSize:9,fontWeight:700,color:"#0e7490",padding:"6px 8px 4px",letterSpacing:"0.08em",textTransform:"uppercase"}}>Hồ sơ bệnh nhân</div>
          {patients.length === 0
            ? <div style={{padding:"12px 8px",fontSize:11,color:"#7dd3fc",lineHeight:1.5}}>Chưa được cấp quyền xem hồ sơ nào. Liên hệ Admin để được cấp quyền.</div>
            : patients.map(u => {
              const sess = u.uid===DEMO_USER.uid ? {profile:SEED_PROFILE} : (SESSION_DATA[u.uid]||{});
              const pname = sess.profile?.fullName || u.displayName || "Bệnh nhân";
              const pdob  = sess.profile?.dateOfBirth;
              const page2 = pdob ? Math.floor((Date.now()-new Date(pdob))/(365.25*24*3600*1000))+"t" : "";
              const isSelected = selPatientUid === u.uid;
              return (
                <button key={u.uid} onClick={()=>loadPatient(u.uid)}
                  style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,
                    background:isSelected?"#0369a1":"transparent",color:isSelected?"white":"#94a3b8",
                    border:"none",cursor:"pointer",textAlign:"left",marginBottom:2,transition:"all 0.12s"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:isSelected?"rgba(255,255,255,0.2)":"#0e4d6e",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>
                    {pname.charAt(pname.lastIndexOf(" ")+1)||"?"}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pname}</div>
                    <div style={{fontSize:9,color:isSelected?"#bae6fd":"#64748b"}}>{page2} · {sess.profile?.bhyt||u.bhytNumber||""}</div>
                  </div>
                </button>
              );
            })
          }
        </div>

        <div style={{padding:"10px 8px",borderTop:"1px solid #0e7490"}}>
          <button onClick={onLogout}
            style={{width:"100%",padding:"8px 10px",borderRadius:8,fontSize:12,background:"transparent",
              color:"#7dd3fc",border:"1px solid #0e7490",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
            <span>🚪</span><span>Đăng xuất</span>
          </button>
        </div>
      </aside>

      {/* Main content */}
      <main style={{flex:1,overflowY:"auto"}}>
        {!selPatientUid ? (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",minHeight:400}}>
            <div style={{textAlign:"center",color:"#94a3b8"}}>
              <div style={{fontSize:56,marginBottom:12}}>👈</div>
              <div style={{fontSize:16,fontWeight:700,color:"#374151",marginBottom:6}}>Chọn bệnh nhân bên trái</div>
              <div style={{fontSize:13}}>để xem hồ sơ và gửi tư vấn</div>
            </div>
          </div>
        ) : (
          <div style={{padding:"20px 24px",maxWidth:960}}>
            {/* Patient header */}
            <div style={{background:"linear-gradient(135deg,#0c4a6e,#0369a1)",borderRadius:14,padding:16,color:"white",marginBottom:16,display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:50,height:50,background:"rgba(255,255,255,0.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,border:"2px solid rgba(255,255,255,0.4)"}}>
                {(p.fullName||"?").charAt((p.fullName||"?").lastIndexOf(" ")+1)}
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#7dd3fc",marginBottom:2}}>BỆNH NHÂN</div>
                <div style={{fontWeight:800,fontSize:17}}>{p.fullName||"Chưa có tên"}</div>
                <div style={{fontSize:12,color:"#bae6fd",marginTop:3,display:"flex",gap:14,flexWrap:"wrap"}}>
                  {p.dateOfBirth&&<span>📅 {fmt(p.dateOfBirth)} ({age}t)</span>}
                  {p.bloodType&&<span>🩸 {p.bloodType}</span>}
                  {p.bhyt&&<span>🏥 BHYT: {p.bhyt}</span>}
                  {p.phone&&<span>📞 {p.phone}</span>}
                </div>
              </div>
              <div style={{flexShrink:0,textAlign:"right"}}>
                <div style={{fontSize:11,color:"#7dd3fc"}}>Tư vấn đã có</div>
                <div style={{fontSize:24,fontWeight:800}}>{consults.length}</div>
              </div>
            </div>

            {/* Nav tabs */}
            <div style={{background:"white",borderRadius:12,border:"1px solid #e0f2fe",overflow:"hidden",marginBottom:16}}>

                <NavBtn id="overview" label="Tổng quan" emoji="📋"/>
                <NavBtn id="aisummary" label="AI Đánh giá" emoji="🤖"/>
                <NavBtn id="events"   label={`Đợt KCB (${(patientData?.events||[]).length})`} emoji="🏥"/>
                <NavBtn id="labs"     label={`XN/SA (${(patientData?.labs||[]).length})`} emoji="🔬"/>
                <NavBtn id="imaging"  label={`CĐHA (${(patientData?.imaging||[]).length})`} emoji="📷"/>
                <NavBtn id="meds"     label={`Thuốc (${(patientData?.medications||[]).filter(m=>m.isActive).length} active)`} emoji="💊"/>
                <NavBtn id="vitals"   label={`Chỉ số (${(patientData?.vitals||[]).length})`} emoji="📊"/>
                {(()=>{
                  const pendingCount = allRequests.filter(r=>r.patientUid===selPatientUid&&r.status==="pending").length;
                  return <NavBtn id="consult" label={"Tư vấn ("+(consults.length)+")"+(pendingCount>0?" 🔴"+pendingCount:"")} emoji="💬"/>;
                })()}
              </div>

              <div style={{padding:18,maxHeight:520,overflowY:"auto"}}>

                {/* Overview */}
                {docPage==="overview" && (
                  <div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
                      {[
                        ["🏥","Đợt KCB",(patientData?.events||[]).length,"#dc2626"],
                        ["🔬","Xét nghiệm",(patientData?.labs||[]).length,"#0891b2"],
                        ["💊","Thuốc đang dùng",(patientData?.medications||[]).filter(m=>m.isActive).length,"#16a34a"],
                        ["⚠️","Dị ứng",(patientData?.allergies||[]).length,"#f59e0b"],
                        ["📊","Chỉ số SK",(patientData?.vitals||[]).length,"#7c3aed"],
                        ["💬","Tư vấn BS",consults.length,"#0369a1"],
                      ].map(([e,l,n,c])=>(
                        <div key={l} style={{background:"#f8fafc",borderTop:`3px solid ${c}`,borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
                          <div style={{fontSize:18}}>{e}</div>
                          <div style={{fontSize:22,fontWeight:800,color:c}}>{n}</div>
                          <div style={{fontSize:11,color:"#64748b"}}>{l}</div>
                        </div>
                      ))}
                    </div>
                    {/* Tiền sử bệnh */}
                    {p.tienSuBanThan&&(
                      <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:10}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#92400e",marginBottom:4}}>📜 Tiền sử bản thân</div>
                        <div style={{fontSize:12,color:"#78350f",lineHeight:1.6}}>{p.tienSuBanThan}</div>
                      </div>
                    )}
                    {/* Dị ứng nặng */}
                    {(patientData?.allergies||[]).filter(a=>["Phản vệ","Nặng"].includes(a.severity)).map((a,i)=>(
                      <div key={i} style={{background:"#fef2f2",border:"2px solid #dc2626",borderRadius:10,padding:"8px 12px",marginBottom:6,display:"flex",gap:8,alignItems:"center"}}>
                        <span style={{fontSize:18}}>🚨</span>
                        <div><span style={{fontWeight:700,color:"#dc2626",fontSize:12}}>DỊ ỨNG NẶNG: </span><span style={{fontSize:12}}>{a.allergen} — {a.severity}{a.symptoms&&` · ${a.symptoms}`}</span></div>
                      </div>
                    ))}
                    {/* Chỉ số gần nhất */}
                    {(patientData?.vitals||[]).length>0&&(()=>{
                      const lv = [...(patientData.vitals)].sort((a,b)=>(b.date||"").localeCompare(a.date||""))[0];
                      return (
                        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"10px 14px"}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:6}}>📊 Chỉ số gần nhất ({fmt(lv.date)})</div>
                          <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:12}}>
                            {lv.height&&<span>📏 <strong>{lv.height}</strong>cm</span>}
                            {lv.weight&&<span>⚖️ <strong>{lv.weight}</strong>kg</span>}
                            {lv.spo2&&<span>💧 SpO2 <strong>{lv.spo2}</strong>%</span>}
                            {lv.heartRate&&<span>❤️ <strong>{lv.heartRate}</strong>l/ph</span>}
                            {lv.bloodPressureSys&&<span>🩺 HA <strong>{lv.bloodPressureSys}/{lv.bloodPressureDia}</strong>mmHg</span>}
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                )}

                {/* Events */}
                {/* ── AI SUMMARY TAB ── */}
                {docPage==="aisummary" && (
                  <div>
                    {/* Action buttons */}
                    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
                      <button onClick={genAISummary} disabled={aiLoading}
                        style={{padding:"10px 20px",background:aiLoading?"#e2e8f0":"linear-gradient(135deg,#7c3aed,#6d28d9)",
                          color:aiLoading?"#94a3b8":"white",border:"none",borderRadius:10,fontSize:13,fontWeight:700,
                          cursor:aiLoading?"not-allowed":"pointer",boxShadow:aiLoading?"none":"0 4px 14px rgba(124,58,237,0.3)",
                          display:"flex",alignItems:"center",gap:8}}>
                        {aiLoading?"⏳ AI đang phân tích...":"🤖 Phân tích toàn diện hồ sơ"}
                      </button>
                      <button onClick={genAIDraft} disabled={aiLoading}
                        style={{padding:"10px 20px",background:aiLoading?"#e2e8f0":"linear-gradient(135deg,#0369a1,#0284c7)",
                          color:aiLoading?"#94a3b8":"white",border:"none",borderRadius:10,fontSize:13,fontWeight:700,
                          cursor:aiLoading?"not-allowed":"pointer",boxShadow:aiLoading?"none":"0 4px 14px rgba(3,105,161,0.3)",
                          display:"flex",alignItems:"center",gap:8}}>
                        {aiLoading?"⏳ Đang soạn...":"✍️ Soạn tư vấn tự động"}
                      </button>
                    </div>

                    {aiErr&&(
                      <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#dc2626"}}>
                        ❌ {aiErr}
                      </div>
                    )}

                    {/* Loading animation */}
                    {aiLoading&&(
                      <div style={{background:"linear-gradient(135deg,#1e1b4b,#312e81)",borderRadius:14,padding:28,textAlign:"center",color:"white"}}>
                        <div style={{fontSize:40,marginBottom:10,animation:"pulse 1.5s infinite"}}>🤖</div>
                        <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>AI đang đọc hồ sơ bệnh nhân...</div>
                        <div style={{fontSize:12,color:"#a5b4fc"}}>Phân tích đợt KCB, xét nghiệm, thuốc và lịch sử điều trị</div>
                      </div>
                    )}

                    {/* AI Summary result */}
                    {!aiLoading&&aiSummary&&(
                      <div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#7c3aed"}}>🤖 KẾT QUẢ PHÂN TÍCH AI</div>
                          <div style={{display:"flex",gap:6}}>
                            <button onClick={()=>{setNewMsg(aiSummary+"\n\n---\n*Tom tat AI ho tro - BS. "+doctor.fullName+" can xac nhan*");setDocPage("consult");}}
                              style={{padding:"4px 12px",background:"#eff6ff",color:"#0369a1",border:"1px solid #bfdbfe",borderRadius:7,fontSize:11,cursor:"pointer",fontWeight:600}}>
                              📋 Đưa vào tư vấn
                            </button>
                            <button onClick={()=>setAiSummary("")}
                              style={{padding:"4px 10px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:7,fontSize:11,cursor:"pointer"}}>
                              ✕ Xoá
                            </button>
                          </div>
                        </div>
                        {/* Render markdown-like */}
                        <div style={{background:"white",border:"1px solid #e0e7ff",borderRadius:12,padding:"16px 18px",fontSize:13,lineHeight:1.8,color:"#1e1b4b"}}>
                          {aiSummary.split("\n").map((line,i)=>{
                            if (line.startsWith("## ")) return <h3 key={i} style={{fontWeight:800,fontSize:14,color:"#4c1d95",margin:"14px 0 6px",borderBottom:"1px solid #e0e7ff",paddingBottom:4}}>{line.replace(/^##\s*/,"")}</h3>;
                            if (line.startsWith("### ")) return <h4 key={i} style={{fontWeight:700,fontSize:13,color:"#5b21b6",margin:"10px 0 4px"}}>{line.replace(/^###\s*/,"")}</h4>;
                            if (line.startsWith("**") && line.endsWith("**")) return <div key={i} style={{fontWeight:700,color:"#1e1b4b",margin:"8px 0 3px"}}>{line.replace(/\*\*/g,"")}</div>;
                            if (line.match(/^\*\*.*\*\*/)) return <div key={i} style={{margin:"3px 0"}} dangerouslySetInnerHTML={{__html:line.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/^- /,"• ")}}></div>;
                            if (line.startsWith("- ") || line.startsWith("• ")) return <div key={i} style={{paddingLeft:16,margin:"2px 0",color:"#374151"}}>• {line.replace(/^[-•]\s*/,"")}</div>;
                            if (line.trim()==="") return <div key={i} style={{height:8}}/>;
                            return <div key={i} style={{margin:"2px 0"}}>{line}</div>;
                          })}
                        </div>
                      </div>
                    )}

                    {/* Placeholder khi chưa chạy */}
                    {!aiLoading&&!aiSummary&&!aiErr&&(
                      <div style={{background:"#faf5ff",border:"2px dashed #c4b5fd",borderRadius:14,padding:"36px 24px",textAlign:"center"}}>
                        <div style={{fontSize:48,marginBottom:12}}>🤖</div>
                        <div style={{fontSize:15,fontWeight:700,color:"#4c1d95",marginBottom:8}}>AI hỗ trợ đánh giá bệnh án</div>
                        <div style={{fontSize:12,color:"#7c3aed",lineHeight:1.7,maxWidth:360,margin:"0 auto"}}>
                          Nhấn <strong>"Phân tích toàn diện"</strong> để AI tóm tắt tình trạng, chỉ ra điểm bất thường và gợi ý theo dõi.<br/>
                          Hoặc <strong>"Soạn tư vấn tự động"</strong> để AI tạo sẵn bản thảo tư vấn cho gia đình.

                {docPage==="events" && (
                  <div>
                    {(patientData?.events||[]).length===0

                            <div style={{fontWeight:700,fontSize:13}}>{ev.title||ev.chanDoan||"Đợt khám"}</div>
                            <span style={{fontSize:11,color:"#64748b"}}>{fmt(ev.date)}</span>
                          </div>
                          <div style={{fontSize:11,color:"#64748b",display:"flex",gap:10,flexWrap:"wrap",marginBottom:ev.tomTatBenhSu?6:0}}>
                            {ev.facility&&<span>🏥 {ev.facility}</span>}
                            {ev.doctor&&<span>👨‍⚕️ {ev.doctor}</span>}
                            {ev.maICD10&&<span style={{fontWeight:600,color:"#7c3aed"}}>ICD: {ev.maICD10}</span>}
                          </div>
                          {ev.chanDoan&&<div style={{fontSize:12,color:"#374151",marginBottom:3}}><strong>Chẩn đoán:</strong> {ev.chanDoan}</div>}
                          {ev.tomTatBenhSu&&<div style={{fontSize:11,color:"#64748b",background:"#f8fafc",borderRadius:7,padding:"6px 8px",lineHeight:1.5}}>{ev.tomTatBenhSu}</div>}
                        </div>
                      ))
                    }
                  </div>
                )}

                {/* Labs */}
                {docPage==="labs" && (
                  <div>
                    {(patientData?.labs||[]).length===0
                      ? <div style={{textAlign:"center",padding:32,color:"#94a3b8"}}>Chưa có kết quả XN</div>
                      : [...(patientData.labs)].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map((lb,i)=>(
                        <div key={lb.id||i} style={{border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 14px",marginBottom:10,background:"white"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                            <div style={{fontWeight:700,fontSize:13}}>{lb.panelName}</div>
                            <span style={{fontSize:11,color:"#64748b"}}>{fmt(lb.date)}</span>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            {(lb.items||[]).map((it,j)=>(
                              <div key={j} style={{display:"flex",justifyContent:"space-between",padding:"3px 8px",borderRadius:6,
                                background:it.isAbnormal?"#fff1f2":"#f8fafc",border:it.isAbnormal?"1px solid #fecaca":"none",fontSize:11}}>
                                <span>{it.name}</span>
                                <span style={{fontWeight:700,color:it.isAbnormal?"#dc2626":""}}>{it.value}{it.unit} {it.isAbnormal?"⚠️":""}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      ))
                    }
                  </div>
                )}

                {/* Imaging */}
                {docPage==="imaging" && (
                  <div>
                    {(patientData?.imaging||[]).length===0
                      ? <div style={{textAlign:"center",padding:32,color:"#94a3b8"}}>Chưa có CĐHA</div>
                      : [...(patientData.imaging)].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map((im,i)=>(
                        <div key={im.id||i} style={{border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 14px",marginBottom:10,background:"white"}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                            <div style={{fontWeight:700,fontSize:13}}>{im.title}</div>
                            <span style={{fontSize:11,color:"#64748b"}}>{fmt(im.date)}</span>
                          </div>
                          <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>{im.facility} {im.doctor&&`· BS. ${im.doctor}`}</div>
                          {im.conclusion&&<div style={{fontSize:12,color:"#374151",background:"#fffbeb",borderRadius:7,padding:"6px 8px"}}><strong>Kết luận:</strong> {im.conclusion}</div>}
                        </div>
                      ))
                    }
                  </div>
                )}

                {/* Medications */}
                {docPage==="meds" && (
                  <div>
                    {(patientData?.medications||[]).length===0
                      ? <div style={{textAlign:"center",padding:32,color:"#94a3b8"}}>Chưa có thuốc</div>
                      : (patientData.medications||[]).map((m,i)=>(
                        <div key={m.id||i} style={{border:`1px solid ${m.isActive?"#bbf7d0":"#e2e8f0"}`,borderLeft:`4px solid ${m.isActive?"#16a34a":"#94a3b8"}`,borderRadius:10,padding:"10px 14px",marginBottom:8,background:m.isActive?"#f0fdf4":"#f8fafc"}}>
                          <div style={{display:"flex",justifyContent:"space-between"}}>
                            <span style={{fontWeight:700,fontSize:13}}>{m.name}</span>
                            <span style={{fontSize:11,fontWeight:600,color:m.isActive?"#16a34a":"#94a3b8"}}>{m.isActive?"● Đang dùng":"○ Đã ngừng"}</span>
                          </div>
                          <div style={{fontSize:11,color:"#64748b",marginTop:3}}>{m.dosage} · {m.frequency} · {m.route} {m.reason&&`· ${m.reason}`}</div>
                        </div>
                      ))
                    }
                  </div>
                )}

                {/* Vitals */}
                {docPage==="vitals" && (
                  <div>
                    {(patientData?.vitals||[]).length===0
                      ? <div style={{textAlign:"center",padding:32,color:"#94a3b8"}}>Chưa có chỉ số</div>
                      : [...(patientData.vitals)].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).map((v,i)=>(
                        <div key={v.id||i} style={{border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 14px",marginBottom:8,background:"white"}}>
                          <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>📅 {fmt(v.date)}</div>
                          <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:12}}>
                            {v.height&&<span>📏 <strong>{v.height}</strong>cm</span>}
                            {v.weight&&<span>⚖️ <strong>{v.weight}</strong>kg</span>}
                            {v.bmi&&<span>BMI <strong>{v.bmi}</strong></span>}
                            {v.spo2&&<span>💧 SpO2 <strong>{v.spo2}%</strong></span>}
                            {v.heartRate&&<span>❤️ <strong>{v.heartRate}</strong>l/ph</span>}
                            {v.bloodPressureSys&&<span>🩺 HA <strong>{v.bloodPressureSys}/{v.bloodPressureDia}</strong></span>}
                            {v.temperature&&<span>🌡️ <strong>{v.temperature}°C</strong></span>}
                          </div>
                        </div>
                      ))
                    }
                  </div>
                )}

                {/* Consult — gửi tư vấn */}
                {docPage==="consult" && (
                  <div>
                    {/* Banner soạn AI */}
                    {!draftEditing&&(
                      <div style={{background:"linear-gradient(135deg,#0c4a6e,#0369a1)",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                        <div style={{color:"white"}}>
                          <div style={{fontWeight:700,fontSize:13}}>✍️ Thư Tư Vấn Sức Khỏe</div>
                          <div style={{fontSize:11,color:"#bae6fd",marginTop:2}}>AI soạn bản thảo · Bác sĩ chỉnh sửa · Xuất PDF có chữ ký</div>
                        </div>
                        <button onClick={genAIDraft} disabled={aiLoading}
                          style={{flexShrink:0,padding:"8px 16px",background:"white",color:"#0369a1",border:"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                          {aiLoading?"⏳ Đang soạn...":"🤖 Tạo bản thảo"}
                        </button>
                      </div>
                    )}

                    {/* Draft editing */}
                    {draftEditing&&(
                      <div style={{background:"white",border:"2px solid #0369a1",borderRadius:14,padding:16,marginBottom:14}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                          <div>
                            <div style={{fontWeight:800,fontSize:14,color:"#0c4a6e"}}>📝 Thư Tư Vấn Sức Khỏe</div>
                            <div style={{fontSize:11,color:"#64748b",marginTop:1}}>Dựa trên hồ sơ được cung cấp và kinh nghiệm thực tiễn</div>
                          </div>
                          <button onClick={()=>{setDraftEditing(false);setNewMsg("");setAiDraft("");}}
                            style={{padding:"4px 10px",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:7,fontSize:11,cursor:"pointer"}}>
                            ✕ Huỷ
                          </button>
                        </div>
                        <div style={{background:"#fefce8",border:"1.5px solid #fbbf24",borderRadius:9,padding:"10px 14px",marginBottom:12,fontSize:11,color:"#713f12",lineHeight:1.6}}>
                          <strong>⚠️ CẢNH BÁO Y ĐỨC — BẮT BUỘC ĐỌC TRƯỚC KHI GỬI:</strong><br/>
                          Nội dung này do AI tổng hợp/đề xuất từ dữ liệu hồ sơ. Có thể <strong>không đầy đủ hoặc không chính xác</strong>. Bác sĩ chịu trách nhiệm chuyên môn, phải xem xét kỹ và chỉnh sửa theo nhận định lâm sàng thực tế trước khi ký tên gửi cho gia đình.
                        </div>
                        <textarea value={newMsg} onChange={e=>setNewMsg(e.target.value)}
                          style={{width:"100%",minHeight:280,padding:"12px 14px",border:"1.5px solid #bfdbfe",borderRadius:9,fontSize:13,
                            fontFamily:"'Times New Roman',serif",lineHeight:1.8,resize:"vertical",outline:"none",boxSizing:"border-box",color:"#0f172a",background:"#fafcff"}}/>
                        <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"8px 12px",marginTop:10,marginBottom:12,fontSize:11}}>
                          <strong style={{color:"#166534"}}>Chữ ký PDF:</strong>
                          <span style={{color:"#374151",marginLeft:6}}>BS. {doctor.fullName} · {doctor.specialty||""} · {doctor.workplace||""} · CCHN: {doctor.licenseNumber}</span>
                        </div>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                          <button onClick={()=>exportConsultPDF(newMsg)}
                            style={{flex:1,minWidth:140,padding:"10px 16px",background:"linear-gradient(135deg,#dc2626,#b91c1c)",color:"white",
                              border:"none",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer",
                              boxShadow:"0 4px 14px rgba(220,38,38,0.3)",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                            📄 Xuất PDF có chữ ký
                          </button>
                          <button onClick={()=>{if(window.confirm("Xác nhận đã đọc kỹ nội dung?"))sendConsult();}}
                            disabled={!newMsg.trim()||saving}
                            style={{flex:1,minWidth:140,padding:"10px 16px",background:newMsg.trim()?"linear-gradient(135deg,#0369a1,#0284c7)":"#e2e8f0",
                              color:newMsg.trim()?"white":"#94a3b8",border:"none",borderRadius:9,fontSize:13,fontWeight:700,
                              cursor:newMsg.trim()?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                            {savedOk?"✅ Đã lưu":saving?"⏳...":"📤 Lưu vào hồ sơ"}
                          </button>
                          <button onClick={genAIDraft} disabled={aiLoading}
                            style={{padding:"10px 14px",background:"#f1f5f9",color:"#374151",border:"1px solid #e2e8f0",borderRadius:9,fontSize:12,cursor:"pointer"}}>
                            🔄 Soạn lại
                          </button>
                        </div>
                      </div>
                    )}

                    {/* Yêu cầu tư vấn từ BN */}
                    {(()=>{
                      const myReqs = allRequests.filter(r=>r.patientUid===selPatientUid);
                      const pending = myReqs.filter(r=>r.status==="pending");
                      const answered = myReqs.filter(r=>r.status==="answered");
                      if(myReqs.length===0) return null;
                      return (
                        <div style={{marginBottom:16}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>
                            Yêu cầu tư vấn từ bệnh nhân ({myReqs.length})
                          </div>
                          {pending.map((r,i)=>(
                            <div key={r.id||i} style={{background:"#fff5f5",border:"1.5px solid #fca5a5",borderLeft:"4px solid #dc2626",borderRadius:10,padding:"12px 14px",marginBottom:8}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                                <div>
                                  <span style={{fontWeight:700,fontSize:12,color:"#dc2626"}}>🔴 Chờ tư vấn · {r.specialty}</span>
                                  {r.doctorUid===doctor.uid&&<span style={{fontSize:10,color:"#dc2626",marginLeft:6,fontWeight:600}}>(Gửi trực tiếp cho bạn)</span>}
                                </div>
                                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                  <span style={{fontSize:10,color:"#94a3b8"}}>{new Date(r.createdAt).toLocaleDateString("vi-VN")}</span>
                                  <button onClick={()=>markRequestAnswered(r.id, r.patientUid)}
                                    style={{padding:"3px 8px",background:"#f0fdf4",color:"#16a34a",border:"1px solid #86efac",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>
                                    ✓ Đánh dấu đã tư vấn
                                  </button>
                                </div>
                              </div>
                              <div style={{fontSize:12,color:"#7f1d1d",lineHeight:1.6}}>{r.message}</div>
                            </div>
                          ))}
                          {answered.map((r,i)=>(
                            <div key={r.id||i} style={{background:"#f0fdf4",border:"1px solid #86efac",borderLeft:"4px solid #16a34a",borderRadius:10,padding:"10px 14px",marginBottom:8,opacity:0.8}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                <span style={{fontWeight:700,fontSize:12,color:"#15803d"}}>🟢 Đã tư vấn · {r.specialty}</span>
                                <span style={{fontSize:10,color:"#94a3b8"}}>{new Date(r.createdAt).toLocaleDateString("vi-VN")}</span>
                              </div>
                              <div style={{fontSize:12,color:"#166534",marginTop:4}}>{r.message.slice(0,80)}...</div>
                            </div>
                          ))}
                        </div>
                      );
                    })()}

                    {/* Lịch sử tư vấn */}
                    <div style={{marginBottom:10}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.05em"}}>Lịch sử tư vấn đã gửi ({consults.length})</div>
                      {consults.length===0
                        ? <div style={{textAlign:"center",padding:24,color:"#94a3b8",fontSize:13,background:"#f8fafc",borderRadius:10}}>Chưa có tư vấn nào.</div>
                        : [...consults].reverse().map((c,i)=>(
                          <div key={c.id||i} style={{background:"white",border:"1px solid #bfdbfe",borderLeft:"4px solid #0369a1",borderRadius:10,padding:"12px 14px",marginBottom:10}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,alignItems:"flex-start"}}>
                              <div>
                                <span style={{fontWeight:700,fontSize:13,color:"#1d4ed8"}}>BS. {c.doctorName}</span>
                                {c.doctorSpec&&<span style={{fontSize:11,color:"#3b82f6",marginLeft:6}}>· {c.doctorSpec}</span>}
                                {c.doctorWork&&<span style={{fontSize:11,color:"#64748b",marginLeft:6}}>· {c.doctorWork}</span>}
                              </div>
                              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                <button onClick={()=>exportConsultPDF(c.message)}
                                  style={{padding:"3px 8px",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:600}}>
                                  📄 PDF
                                </button>
                                <span style={{fontSize:10,color:"#94a3b8"}}>{new Date(c.createdAt).toLocaleString("vi-VN")}</span>
                              </div>
                            </div>
                            <div style={{fontSize:12,color:"#1e3a5f",lineHeight:1.7,whiteSpace:"pre-line",maxHeight:150,overflowY:"auto"}}>{c.message}</div>
                          </div>
                        ))
                      }
                    </div>

                    {/* Soạn thủ công */}
                    {!draftEditing&&(
                      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:14}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:8}}>✏️ Hoặc soạn tư vấn thủ công</div>
                        <textarea value={newMsg} onChange={e=>setNewMsg(e.target.value)}
                          placeholder="Nhập nhận xét, tư vấn thủ công..."
                          style={{width:"100%",minHeight:80,padding:"10px 12px",border:"1.5px solid #e2e8f0",borderRadius:9,fontSize:13,
                            fontFamily:"system-ui",lineHeight:1.6,resize:"vertical",outline:"none",boxSizing:"border-box",color:"#0f172a"}}/>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
                          <div style={{fontSize:11,color:"#94a3b8"}}>BS. {doctor.fullName} · {doctor.specialty}</div>
                          <button onClick={sendConsult} disabled={!newMsg.trim()||saving}
                            style={{padding:"7px 16px",background:newMsg.trim()?"#0369a1":"#e2e8f0",
                              color:newMsg.trim()?"white":"#94a3b8",border:"none",borderRadius:8,fontSize:12,fontWeight:700,
                              cursor:newMsg.trim()?"pointer":"not-allowed"}}>
                            {savedOk?"✅ Đã lưu":saving?"...":"📤 Gửi"}
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}

              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
};

// ── ConsultPage — bệnh nhân xem tư vấn + gửi yêu cầu ────────
const SPECIALTIES = ["Tim mạch","Nhi khoa","Nội tổng quát","Ngoại khoa","Thần kinh","Hô hấp","Tiêu hóa","Cơ xương khớp","Da liễu","Mắt","Tai mũi họng","Sản phụ khoa","Ung bướu","Nội tiết","Thận - Tiết niệu","Tâm thần","Phục hồi chức năng","Dinh dưỡng"];

const ConsultPage = ({currentUser, profile}) => {
  const uid = currentUser?.uid;
  const [consults,  setConsults]  = React.useState(uid ? loadConsultsFromLS(uid) : []);
  const [requests,  setRequests]  = React.useState(uid ? loadRequestsFromLS(uid) : []);
  const [showForm,  setShowForm]  = React.useState(false);
  const [selDoctor, setSelDoctor] = React.useState("");
  const [selSpec,   setSelSpec]   = React.useState("");
  const [msg,       setMsg]       = React.useState("");
  const [sent,      setSent]      = React.useState(false);
  const fmt  = d => d ? new Date(d).toLocaleString("vi-VN") : "—";
  const fmtD = d => d ? new Date(d).toLocaleDateString("vi-VN") : "—";

  const activeDoctors = Object.values(DOCTOR_DB).filter(d=>d.status==="active");

  const sendRequest = () => {
    if (!msg.trim()) return;
    const req = {
      id: "req_"+Date.now(),
      patientUid: uid,
      patientName: profile?.fullName || currentUser?.displayName || "?",
      specialty: selSpec,
      doctorUid: selDoctor||null,
      message: msg.trim(),
      status: "pending", // pending | answered
      createdAt: new Date().toISOString(),
    };
    const updated = [...requests, req];
    setRequests(updated);
    saveRequestsToLS(uid, updated);
    setMsg(""); setSelDoctor(""); setSelSpec(""); setShowForm(false); setSent(true);
    setTimeout(()=>setSent(false), 3000);
  };

  // Reload khi mount
  React.useEffect(()=>{
    if(uid){ setConsults(loadConsultsFromLS(uid)); setRequests(loadRequestsFromLS(uid)); }
  },[uid]);

  const pendingReqs = requests.filter(r=>r.status==="pending");
  const answeredReqs = requests.filter(r=>r.status==="answered");

  return (
    <div style={{padding:"20px 24px",maxWidth:780}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,margin:"0 0 4px",color:"#0f172a"}}>👨‍⚕️ Tư vấn Bác sĩ</h1>
          <p style={{fontSize:12,color:"#64748b",margin:0}}>Gửi yêu cầu tư vấn và xem phản hồi từ bác sĩ</p>
        </div>
        <button onClick={()=>setShowForm(f=>!f)}
          style={{padding:"9px 18px",background:"linear-gradient(135deg,#0369a1,#0284c7)",color:"white",
            border:"none",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",
            boxShadow:"0 4px 12px rgba(3,105,161,0.3)"}}>
          {showForm?"✕ Đóng":"📋 Yêu cầu tư vấn"}
        </button>
      </div>

      {sent&&<div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#166534",fontWeight:600}}>✅ Yêu cầu tư vấn đã gửi thành công! Bác sĩ sẽ phản hồi sớm.</div>}

      {/* Form yêu cầu tư vấn */}
      {showForm&&(
        <div style={{background:"white",border:"2px solid #0369a1",borderRadius:14,padding:18,marginBottom:20}}>
          <div style={{fontWeight:800,fontSize:14,color:"#0c4a6e",marginBottom:14}}>📋 Gửi Yêu Cầu Tư Vấn</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>

(function restoreUsersFromLS() {
  try {
    // Xóa bất kỳ entry LS nào của demo Bình An (không bao giờ lưu)
    localStorage.removeItem(LS_PREFIX + DEMO_USER.uid);
    const index = JSON.parse(localStorage.getItem(LS_INDEX)||"[]");
    // Lọc bỏ demo uid khỏi index nếu lỡ bị thêm vào
    const cleanIndex = index.filter(uid => uid !== DEMO_USER.uid);
    if (cleanIndex.length !== index.length) localStorage.setItem(LS_INDEX, JSON.stringify(cleanIndex));
    cleanIndex.forEach(uid => {
      try {
        const raw = localStorage.getItem(LS_PREFIX+uid);
        if (!raw) return;
        const {user, data} = JSON.parse(raw);
        if (user && user.uid && user.uid !== DEMO_USER.uid) {
          // Kiểm tra data có bị nhiễm Bình An không
          const contaminated = data?.profile?.fullName === "Phan Đình Bình An"
            || data?.profile?.bhyt === "TE1 79 79 395";
          if (contaminated) {
            // Xóa data bị nhiễm, giữ lại user account
            localStorage.removeItem(LS_PREFIX+uid);
            SESSION_DATA[uid] = {};
            USER_DB[uid] = user;
          } else {
            USER_DB[uid] = user;
            SESSION_DATA[uid] = data || {};
          }
        }
      } catch(e) {}
    });
  } catch(e) {}
})();

// Lưu một user + data vào localStorage
const saveUserToLS = (uid, user, data) => {
  try {
    const payload = JSON.stringify({user, data});
    localStorage.setItem(LS_PREFIX+uid, payload);
    const index = JSON.parse(localStorage.getItem(LS_INDEX)||"[]");
    if (!index.includes(uid)) { index.push(uid); localStorage.setItem(LS_INDEX, JSON.stringify(index)); }
  } catch(e) {}
  // Sync to Firebase
  saveUserToFirebase(uid, user, data);
};

// Xóa user khỏi localStorage
const removeUserFromLS = (uid) => {
  try {
    localStorage.removeItem(LS_PREFIX+uid);
    const index = JSON.parse(localStorage.getItem(LS_INDEX)||"[]");
    localStorage.setItem(LS_INDEX, JSON.stringify(index.filter(x=>x!==uid)));
  } catch(e) {}
  fsDel("users", uid);
  fsDel("consults", uid);
  fsDel("requests", uid);
};

// MODULE: AI INTAKE v2 — Upload tài liệu, AI tổng hợp, phát hiện trùng lắp
// ══════════════════════════════════════════════════════════════════════════

const AIIntakePage = ({ onComplete, existingData, currentUser }) => {
  const [step, setStep] = React.useState(1); // 1=upload | 2=processing | 3=review | 4=done
  const [files, setFiles] = React.useState([]);
  const [dragOver, setDragOver] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const [progressMsg, setProgressMsg] = React.useState("");
  const [progressDetail, setProgressDetail] = React.useState("");
  const [extracted, setExtracted] = React.useState(null);
  const [editData, setEditData] = React.useState(null);
  const [duplicates, setDuplicates] = React.useState({});
  const [error, setError] = React.useState("");
  const [activeTab, setActiveTab] = React.useState("profile");
  const [removedFiles, setRemovedFiles] = React.useState(new Set());
  const [dupFileWarning, setDupFileWarning] = React.useState([]); // files trùng tên/size
  const [showHistory, setShowHistory] = React.useState(false);
  const [confirmDupFiles, setConfirmDupFiles] = React.useState(null); // null | "waiting" | "proceed"
  const inputRef = React.useRef();

  // ── localStorage key cho lịch sử file theo user ──────────────
  const LS_FILE_HISTORY = `phr_files_${currentUser?.uid||"demo"}`;

  // Load lịch sử file từ localStorage
  const loadFileHistory = () => {
    try { return JSON.parse(localStorage.getItem(LS_FILE_HISTORY)||"[]"); }
    catch(e) { return []; }
  };

  // Lưu lịch sử file vào localStorage
  const saveFileHistory = (history) => {
    try { localStorage.setItem(LS_FILE_HISTORY, JSON.stringify(history)); }
    catch(e) {}
  };

  // Tạo fingerprint cho file (name + size + lastModified)
  const fingerprint = (f) => `${f.name}|${f.size}|${f.lastModified||0}`;

  // ── File management ──────────────────────────────────────────
  const addFiles = (newFiles) => {
    const arr = Array.from(newFiles).filter(f =>
      f.type.startsWith("image/") || f.type === "application/pdf" || f.type === "text/plain"
    );
    // Kiểm tra trùng với lịch sử đã upload
    const history = loadFileHistory();
    const dupFiles = arr.filter(f => {
      const fp = fingerprint(f);
      return history.some(h => h.fingerprint === fp || h.name === f.name);
    });
    if (dupFiles.length > 0) {
      setDupFileWarning(dupFiles.map(f => {
        const prev = history.find(h => h.fingerprint === fingerprint(f) || h.name === f.name);
        return { name: f.name, size: f.size, prevDate: prev?.uploadedAt, prevResult: prev?.resultSummary };
      }));
      setConfirmDupFiles("waiting");
    }
    setFiles(prev => {
      const existing = new Set(prev.map(f => f.name));
      return [...prev, ...arr.filter(f => !existing.has(f.name))];
    });
  };

  const removeFile = (name) => {
    setFiles(prev => prev.filter(f => f.name !== name));
    setRemovedFiles(prev => new Set([...prev, name]));
  };

  // Lưu file đã xử lý vào lịch sử
  const recordFilesToHistory = (fileData, resultSummary) => {
    const history = loadFileHistory();
    const now = new Date().toISOString();
    const newEntries = fileData.map(fd => ({
      name: fd.name,
      size: fd.size,
      type: fd.type,
      fingerprint: `${fd.name}|${fd.size}|0`,
      uploadedAt: now,
      resultSummary: resultSummary || "",
    }));
    // Upsert: cập nhật nếu đã có, thêm mới nếu chưa có
    const updated = [...history];
    newEntries.forEach(ne => {
      const idx = updated.findIndex(h => h.name === ne.name);
      if (idx >= 0) updated[idx] = { ...updated[idx], ...ne, uploadedAt: now };
      else updated.push(ne);
    });
    // Giữ tối đa 50 entry
    saveFileHistory(updated.slice(-50));
  };

  // ── Read file as base64 or text ──────────────────────────────
  // Nén ảnh tối đa 1200px, quality 0.75 — tránh vượt token limit API
  const compressImage = (file) => new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX = 1200;
      let {width: w, height: h} = img;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      const b64 = canvas.toDataURL("image/jpeg", 0.75).split(",")[1];
      resolve({ type:"image", content:b64, mediaType:"image/jpeg", name:file.name, size:b64.length });
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });

  const readFile = (file) => new Promise((resolve, reject) => {
    const r = new FileReader();
    if (file.type === "text/plain") {
      r.onload = e => resolve({ type:"text", content:e.target.result, name:file.name, size:file.size });
      r.onerror = reject;
      r.readAsText(file, "utf-8");
    } else if (file.type === "application/pdf") {
      r.onload = e => resolve({ type:"pdf", content:e.target.result.split(",")[1], mediaType:"application/pdf", name:file.name, size:file.size });
      r.onerror = reject;
      r.readAsDataURL(file);
    } else {
      // Ảnh → nén trước khi gửi API
      compressImage(file).then(resolve).catch(reject);
    }
  });

  // ── Phát hiện trùng lắp với dữ liệu hiện có ─────────────────
  const detectDuplicates = (parsed) => {
    const dups = {};
    const existing = {
      events:      (existingData?._events) || [],
      labs:        (existingData?._labs) || [],
      medications: (existingData?._medications) || [],
    };

    // So sánh events theo ngày + cơ sở + chẩn đoán
    (parsed.events || []).forEach((ev, i) => {
      const isDup = existing.events.some(ex =>
        ex.date === ev.date && (
          (ex.facility && ev.facility && ex.facility.toLowerCase().includes(ev.facility.toLowerCase().slice(0,6))) ||
          (ex.chanDoan && ev.chanDoan && ex.chanDoan.toLowerCase().includes(ev.chanDoan.toLowerCase().slice(0,10)))
        )
      );
      if (isDup) dups[`events:${i}`] = "duplicate";
    });

    // Phát hiện trùng trong chính parsed data (cùng file upload 2 lần)
    (parsed.events || []).forEach((ev, i) => {
      (parsed.events || []).forEach((ev2, j) => {
        if (i !== j && ev.date === ev2.date && ev.facility === ev2.facility && ev.chanDoan === ev2.chanDoan) {
          if (!dups[`events:${i}`]) dups[`events:${j}`] = "self-duplicate";
        }
      });
    });

    (parsed.labs || []).forEach((lb, i) => {
      (parsed.labs || []).forEach((lb2, j) => {
        if (i !== j && lb.date === lb2.date && lb.panelName === lb2.panelName) {
          if (!dups[`labs:${i}`]) dups[`labs:${j}`] = "self-duplicate";
        }
      });
    });

    (parsed.medications || []).forEach((m, i) => {
      (parsed.medications || []).forEach((m2, j) => {
        if (i !== j && m.name === m2.name && m.dosage === m2.dosage) {
          if (!dups[`meds:${i}`]) dups[`meds:${j}`] = "self-duplicate";
        }
      });
    });

    return dups;
  };

  // ── Main process ─────────────────────────────────────────────
  const processFiles = async () => {
    if (files.length === 0) return;
    setStep(2);
    setProgress(5);
    setProgressMsg("Đang đọc tài liệu...");
    setProgressDetail("");
    setError("");

    try {
      // Đọc + nén tuần tự, bỏ qua file lỗi
      const fileData = [];
      for (let i = 0; i < files.length; i++) {
        setProgressMsg(`Đang đọc file ${i+1}/${files.length}...`);
        setProgressDetail(files[i].name);
        const fd = await readFile(files[i]);
        if (fd) fileData.push(fd);
      }
      const totalKB = Math.round(fileData.reduce((a,f)=>a+(f.size||0),0)/1024);
      setProgress(15);
      setProgressMsg(`Đã xử lý ${fileData.length} tài liệu (${totalKB} KB)`);
      setProgressDetail("Đang chuẩn bị gửi tới AI...");

      const systemPrompt = `Bạn là AI y tế chuyên trích xuất thông tin từ hồ sơ bệnh án Việt Nam.
Nhiệm vụ: Đọc các tài liệu y tế và trích xuất thông tin vào cấu trúc JSON CHÍNH XÁC sau.
CHỈ trả về JSON, không markdown, không giải thích, không text thêm.

{

    "bloodType": "", "danToc": "", "quocTich": "Việt Nam", "ngheNghiep": "",
    "phone": "", "email": "", "bhyt": "", "soCCCD": "",
    "diaChiSoNha": "", "diaChiXaPhuong": "", "diaChiQuanHuyen": "", "diaChiTinhTP": "",
    "nguoiDaiDienHoTen": "", "nguoiDaiDienQuanHe": "", "nguoiDaiDienPhone": "",
    "tienSuBanThan": "", "tienSuGiaDinh": ""
  },
  "events": [{
    "id": "e1", "type": "VISIT|HOSPITALIZATION|SURGERY|ILLNESS|VACCINATION|OTHER",
    "title": "", "date": "YYYY-MM-DD", "dateIn": "YYYY-MM-DD", "dateOut": "YYYY-MM-DD",
    "facility": "", "doctor": "",
    "loaiKCB": "1-Ngoại trú|2-Điều trị ngoại trú|3-Nội trú|4-Điều trị ban ngày|5-Kê đơn lĩnh thuốc theo hẹn|6-KCB từ xa",
    "chanDoan": "", "maICD10": "", "tenICD10": "",

      // Giới hạn: tối đa 5 ảnh để tránh rate limit (429)
      const MAX_IMG = 5;
      let imgCount = 0;
      const skipped = [];
      const userContent = [];
      for (const fd of fileData) {
        if (fd.type === "image") {
          if (imgCount >= MAX_IMG) { skipped.push(fd.name); continue; }
          imgCount++;
          userContent.push({ type: "image", source: { type: "base64", media_type: fd.mediaType, data: fd.content } });
          userContent.push({ type: "text", text: `[Ảnh ${imgCount}: ${fd.name}]` });
        } else if (fd.type === "text") {
          userContent.push({ type: "text", text: `[FILE: ${fd.name}]\n${fd.content.slice(0,8000)}\n[/FILE]` });
        } else if (fd.type === "pdf") {
          userContent.push({ type: "document", source: { type: "base64", media_type: "application/pdf", data: fd.content } });
          userContent.push({ type: "text", text: `[PDF: ${fd.name}]` });
        }
      }
      if (skipped.length > 0) setProgressDetail(`⚠️ Bỏ qua ${skipped.length} ảnh do giới hạn: ${skipped.join(", ")}`);
      // Thêm context bệnh nhân hiện tại để AI nhận diện đúng

      const ctxLines = [];
      if(ep.fullName)    ctxLines.push(`Bệnh nhân: ${ep.fullName}`);
      if(ep.dateOfBirth) ctxLines.push(`Ngày sinh: ${ep.dateOfBirth}`);
      if(ep.bhyt)        ctxLines.push(`BHYT: ${ep.bhyt}`);
      if(ctxLines.length) userContent.push({ type:"text", text:`[CONTEXT BN HIỆN TẠI]\n${ctxLines.join("\n")}\n[/CONTEXT]` });
      userContent.push({ type: "text", text: "Trích xuất toàn bộ thông tin y tế từ TẤT CẢ tài liệu trên. Chỉ trả về JSON hợp lệ, bắt đầu bằng { và kết thúc bằng }" });

      setProgress(30);

      setProgressDetail(`Gửi ${fileData.length} file tới Claude API`);

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 8000,
          system: systemPrompt,
          messages: [{ role: "user", content: userContent }],
        })
      });

      setProgress(70);
      setProgressMsg("AI đã xử lý xong, đang đọc kết quả...");
      setProgressDetail("Parsing JSON...");

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API lỗi ${response.status}: ${errText.slice(0, 200)}`);
      }

      const apiData = await response.json();

      if (apiData.error) throw new Error(apiData.error.message || "API error");

      const rawText = (apiData.content || []).map(b => b.text || "").join("").trim();

      if (!rawText) throw new Error("AI không trả về nội dung. Vui lòng thử lại.");

      // Parse JSON — nhiều cách thử
      let parsed = null;
      const attempts = [
        () => JSON.parse(rawText),
        () => JSON.parse(rawText.replace(/^```[a-z]*\n?/, "").replace(/\n?```$/, "").trim()),
        () => { const m = rawText.match(/\{[\s\S]*\}/); if (m) return JSON.parse(m[0]); throw new Error("no match"); },
        () => { const s = rawText.indexOf("{"); const e = rawText.lastIndexOf("}"); if (s>=0&&e>s) return JSON.parse(rawText.slice(s, e+1)); throw new Error("no braces"); },
      ];
      for (const attempt of attempts) {
        try { parsed = attempt(); break; } catch {}
      }
      if (!parsed) throw new Error("Không thể đọc kết quả từ AI. Hãy thử lại hoặc dùng file văn bản (.txt).");

      setProgress(85);

        if (Array.isArray(parsed[key])) {

            ...x,
            id: (!x.id || x.id === "auto" || x.id.match(/^[a-z]+\d+$/)) ? gid(prefixes[key], i) : x.id
          }));

      });

      // Phát hiện trùng lắp
      const dups = detectDuplicates(parsed);

      setProgress(95);
